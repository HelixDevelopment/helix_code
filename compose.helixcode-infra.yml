# HelixCode Infrastructure Stack for nezha.local
# Pre-built images only (no build directives) — deploys via deploy-stack.
# Port 5433 for postgres avoids conflict with OTA project on 5432.
#
# Location: HelixCode meta-repo root (relocated here from the project-agnostic
# vasic-digital/containers submodule per CONST-051(B) decoupling — the
# containers submodule MUST stay project-unaware and reusable).
#
# Usage (deploy-stack ships in the containers submodule):
#   submodules/containers/deploy-stack \
#     --env ./.env \
#     --host-index 1 \
#     --compose ./compose.helixcode-infra.yml \
#     --remote-dir helix-infra
#
# This compose references no project-relative paths: every service uses a
# pre-built `image:` and named docker volumes only, so it resolves identically
# from any working directory the --compose flag points at.

services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: helixcode-infra-postgres
    environment:
      POSTGRES_DB: helixcode_test
      POSTGRES_USER: helixcode
      POSTGRES_PASSWORD: helixcode_test_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixcode -d helixcode_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - helixcode-infra
    volumes:
      - helixcode-infra-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # ============================================
  # CACHE
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: helixcode-infra-redis
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - helixcode-infra
    volumes:
      - helixcode-infra-redis-data:/data
    restart: unless-stopped

  memcached:
    image: memcached:1.6-alpine
    container_name: helixcode-infra-memcached
    command: memcached -m 64
    ports:
      - "11211:11211"
    healthcheck:
      test: ["CMD-SHELL", "echo stats | nc -w 1 127.0.0.1 11211 | grep -q uptime"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - helixcode-infra
    restart: unless-stopped

  # ============================================
  # LLM PROVIDERS
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: helixcode-infra-ollama
    ports:
      - "11434:11434"
    volumes:
      - helixcode-infra-ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - helixcode-infra
    restart: unless-stopped

  # ============================================
  # BROWSER TESTING
  # ============================================
  selenium-chrome:
    image: selenium/standalone-chrome:latest
    container_name: helixcode-infra-selenium
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: 2gb
    environment:
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - helixcode-infra
    restart: unless-stopped

  chromedp:
    image: chromedp/headless-shell:latest
    container_name: helixcode-infra-chromedp
    ports:
      - "9222:9222"
    command:
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --disable-gpu
      - --no-sandbox
      - --disable-dev-shm-usage
    networks:
      - helixcode-infra
    restart: unless-stopped

  # ============================================
  # KNOWLEDGE GRAPH / VECTOR DBs
  # ============================================
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    container_name: helixcode-infra-weaviate
    ports:
      - "8081:8080"
      - "50051:50051"
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - CLUSTER_HOSTNAME=node1
    volumes:
      - helixcode-infra-weaviate-data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - helixcode-infra
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: helixcode-infra-chromadb
    ports:
      - "8082:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - helixcode-infra-chromadb-data:/chroma/chroma
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000 && printf 'GET /api/v2/heartbeat HTTP/1.0\\r\\n\\r\\n' >&3 && head -c 100 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - helixcode-infra
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: helixcode-infra-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - helixcode-infra-qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333 && printf 'GET /readyz HTTP/1.0\\r\\n\\r\\n' >&3 && head -c 100 <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - helixcode-infra
    restart: unless-stopped

  cognee:
    image: cognee/cognee:latest
    container_name: helixcode-infra-cognee
    environment:
      - COGNEE_API_KEY=test_cognee_key_123
      - COGNEE_MODE=local
      - COGNEE_REDIS_URL=redis://redis:6379
      - COGNEE_POSTGRES_URL=postgresql://helixcode:helixcode_test_password@postgres:5432/helixcode_test
      - COGNEE_ENV=development
      - COGNEE_LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - helixcode-infra
    volumes:
      - helixcode-infra-cognee-data:/app/data
    restart: unless-stopped

  # ============================================
  # NETWORKING
  # ============================================
  multicast-router:
    image: alpine:latest
    container_name: helixcode-infra-multicast
    cap_add:
      - NET_ADMIN
    command: >
      sh -c "
        apk add --no-cache iproute2 >/dev/null 2>&1 &&
        sysctl -w net.ipv4.ip_forward=1 >/dev/null 2>&1 &&
        ip route add 224.0.0.0/4 dev eth0 2>/dev/null || true &&
        tail -f /dev/null
      "
    networks:
      helixcode-infra:
        ipv4_address: 172.29.0.254
    restart: unless-stopped

networks:
  helixcode-infra:
    driver: bridge
    name: helixcode-infra-network
    ipam:
      config:
        - subnet: 172.29.0.0/16

volumes:
  helixcode-infra-postgres-data:
  helixcode-infra-redis-data:
  helixcode-infra-ollama-data:
  helixcode-infra-weaviate-data:
  helixcode-infra-chromadb-data:
  helixcode-infra-qdrant-data:
  helixcode-infra-cognee-data:
