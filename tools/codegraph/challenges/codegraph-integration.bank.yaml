    tags: [codegraph, anti-bluff, layer-c, kimi]
    estimated_duration: "230s"
    expected_result: "Kimi CLI reaches CodeGraph"
    fix_reference:
      bug_id: "CG12"
      description: "Layer-C proof that Kimi CLI reaches CodeGraph"
      fix_file: "tools/codegraph/challenges/cg-challenge-05-kimi.sh"
      fix_commit: "pending"

  - id: CG-CHALLENGE-06
    name: "Layer C — Crush reaches CodeGraph"
    category: e2e
