# SonarQube Project Configuration for HelixCode
# All sensitive values are loaded from environment variables.
# Set SONARQUBE_PROJECT_KEY, SONARQUBE_PROJECT_NAME, SONARQUBE_PROJECT_VERSION
# in HelixCode/.env before running scans.

# Project identification — sourced from env at scan time via sonar-scanner -D flags
# Do NOT hardcode project key or token here.
sonar.projectKey=${SONARQUBE_PROJECT_KEY}
sonar.projectName=${SONARQUBE_PROJECT_NAME}
sonar.projectVersion=${SONARQUBE_PROJECT_VERSION}

# Project description
sonar.projectDescription=Enterprise-grade distributed AI development platform

# Source code location
sonar.sources=.
sonar.exclusions=\
  vendor/**,\
  bin/**,\
  releases/**,\
  logs/**,\
  reports/**,\
  applications/desktop/**,\
  applications/terminal-ui/**,\
  applications/ios/**,\
  applications/android/**,\
  applications/aurora-os/**,\
  applications/harmony-os/**,\
  **/*_test.go,\
  **/testdata/**,\
  **/vendor/**,\
  **/node_modules/**

# Test files
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=\
  vendor/**,\
  bin/**

# Language settings
sonar.language=go
sonar.go.coverage.reportPaths=coverage.out
sonar.go.tests.reportPaths=test-report.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality gate — set to false so CI does not block on quality gate in CI-less mode
sonar.qualitygate.wait=false

# Issue ignore rules
sonar.issue.ignore.multicriteria=e1,e2,e3

# Ignore generated protobuf files
sonar.issue.ignore.multicriteria.e1.ruleKey=go:SXXXX
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.pb.go

# Ignore vendor directory issues
sonar.issue.ignore.multicriteria.e2.ruleKey=*
sonar.issue.ignore.multicriteria.e2.resourceKey=vendor/**

# Ignore test helper complexity
sonar.issue.ignore.multicriteria.e3.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*_test.go

# Coverage settings
sonar.coverage.exclusions=\
  **/cmd/**,\
  **/main.go,\
  **/vendor/**

# Duplication settings
sonar.cpd.exclusions=\
  **/*_test.go,\
  **/vendor/**
