# Minimal test configuration for Phase 2 integration
server:
  address: "0.0.0.0"
  port: 8080
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 300
  shutdown_timeout: 30

database:
  host: ""  # No database for minimal testing
  port: 5432
  user: "helix"
  password: "helixpass"
  dbname: "helixcode_prod"
  sslmode: "disable"

redis:
  host: "localhost"
  port: 6379
  password: "redispass"
  db: 0
  enabled: false  # Disable Redis for minimal testing

auth:
  jwt_secret: "test-secret-key-for-phase2-integration-testing-only"
  token_expiry: 86400
  session_expiry: 604800
  bcrypt_cost: 12

workers:
  health_check_interval: 30
  health_ttl: 120
  max_concurrent_tasks: 10
  auto_install: true
  ssh_timeout: 30

tasks:
  max_retries: 3
  checkpoint_interval: 300
  cleanup_interval: 3600

llm:
  default_provider: "local"
  max_tokens: 4096
  temperature: 0.7
  timeout: 30
  max_retries: 3
  
  providers:
    local:
      type: local
      endpoint: "http://localhost:11434"
      enabled: true
      parameters:
        timeout: 30.0
        max_retries: 3
        streaming_support: true
        
    ollama:
      type: ollama
      endpoint: "http://localhost:11434"
      enabled: true
      parameters:
        timeout: 30.0
        max_retries: 3
        streaming_support: true

logging:
  level: "info"
  format: "text"
  output: "stdout"

notifications:
  enabled: false  # Disable for minimal testing