# ============================================================================
# Mistborn remote services — booted on mistborn.local via podman-compose
# ============================================================================
# Per operator mandate 2026-05-13: every container EXCEPT HelixAgent +
# HelixCode (which run on the developer host) is distributed to
# mistborn.local for execution.
#
# Bring up on mistborn:
#   scp docs/distribution/docker-compose.mistborn.yml \
#     milosvasic@mistborn.local:/tmp/
#   ssh milosvasic@mistborn.local 'cd /tmp && \
#     PATH=/opt/homebrew/bin:$PATH podman-compose -f docker-compose.mistborn.yml up -d'
#
# From the dev host, tunnel the published ports back via SSH:
#   ssh -fN \
#     -L 5432:127.0.0.1:5432 \
#     -L 6379:127.0.0.1:6379 \
#     -L 11434:127.0.0.1:11434 \
#     -L 6333:127.0.0.1:6333 \
#     -L 8000:127.0.0.1:8000 \
#     -L 8087:127.0.0.1:8087 \
#     -L 9090:127.0.0.1:9090 \
#     -L 3001:127.0.0.1:3000 \
#     milosvasic@mistborn.local
#
# HelixCode + HelixAgent then connect to localhost:<port> as if the
# services were local — that's the operator-visible promise.
# ============================================================================

services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: helix-mistborn-postgres
    environment:
      POSTGRES_DB: helixcode_prod
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: ${HELIX_POSTGRES_PASSWORD:-helixpass}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d helixcode_prod"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: helix-mistborn-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ----- Vector / memory stores -----
  qdrant:
    # No container-side healthcheck: the qdrant slim image lacks
    # curl/wget, so any HTTP-probe CMD-SHELL inside the container
    # perpetually reports "unhealthy" even when the service is fine
    # (logs show qdrant listening on 6333). That's a CONST-035 PASS-bluff
    # in reverse — a misleading negative. The external mistborn-up.sh
    # tunnel + a Go probe against 127.0.0.1:16333 is the authoritative
    # health signal, since it captures real wire traffic.
    image: docker.io/qdrant/qdrant:latest
    container_name: helix-mistborn-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  chromadb:
    # Same reasoning as qdrant — chromadb slim image lacks HTTP-probe
    # tools. External Go probe against 127.0.0.1:18000 is authoritative.
    image: docker.io/chromadb/chroma:latest
    container_name: helix-mistborn-chromadb
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ----- LLM serving -----
  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: helix-mistborn-ollama
    ports:
      - "11434:11434"
    volumes:
      - helix-ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ----- Observability -----
  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: helix-mistborn-prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: helix-mistborn-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${HELIX_GRAFANA_USER:-helix}
      GF_SECURITY_ADMIN_PASSWORD: ${HELIX_GRAFANA_PASSWORD:-helixpass}
      GF_USERS_ALLOW_SIGN_UP: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

volumes:
  helix-ollama-models:
