    priority: critical
    platforms: [web]
    steps:
      - name: "Login as admin"
        action: "Login with admin/admin123 credentials"
        expected: "Redirected to dashboard"
      - name: "Refresh the page"
        action: "Press F5 or click browser refresh"
        expected: "Page reloads and user remains logged in on dashboard"
      - name: "Verify auth state"
        action: "Check that dashboard content is visible, not login form"
        expected: "Dashboard is displayed, user is still authenticated"
    tags: [auth, session, persistence, jwt]
    estimated_duration: "15s"
    expected_result: "User stays logged in after page refresh"

  - id: FQA-WEB-009
