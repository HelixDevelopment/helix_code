        action: "Open http://localhost:3000/login"
        expected: "Login form displayed"
      - name: "Enter only username"
        action: "Type 'admin' in username field, leave password empty"
        expected: "Username entered, password empty"
      - name: "Submit form"
        action: "Click Sign In button"
        expected: "Validation error shown for empty password field"
    tags: [auth, login, validation, form]
    estimated_duration: "10s"
    expected_result: "Form validation prevents submission with empty password"

  - id: FQA-WEB-006
    name: "Login with both fields empty shows validation"
    category: functional
    priority: high
    platforms: [web]
    steps:
      - name: "Navigate to login page"
        action: "Open http://localhost:3000/login"
        expected: "Login form displayed"
      - name: "Submit empty form"
        action: "Click Sign In button without entering any data"
        expected: "Validation errors shown for both username and password fields"
    tags: [auth, login, validation, form]
    estimated_duration: "10s"
    expected_result: "Both fields show validation errors when submitted empty"

  - id: FQA-WEB-007
    name: "Logout redirects to login page"
    category: functional
    priority: critical
    platforms: [web]
    steps:
      - name: "Login as admin"
        action: "Login with admin/admin123 credentials"
        expected: "Redirected to dashboard"
      - name: "Click logout"
        action: "Click the logout button in the header or user menu"
        expected: "User is logged out and redirected to /login"
      - name: "Verify redirect"
        action: "Check current URL"
        expected: "URL is /login and login form is displayed"
    tags: [auth, logout, redirect]
    estimated_duration: "15s"
    expected_result: "User is logged out and redirected to login page"

  - id: FQA-WEB-008
    name: "Session persistence after page refresh"
