    category: functional
    priority: critical
    platforms: [web]
    steps:
      - name: "Clear session"
        action: "Clear browser localStorage/cookies or open incognito window"
        expected: "No active session"
      - name: "Navigate to protected route"
        action: "Open http://localhost:3000/dashboard directly"
        expected: "Redirected to /login page"
      - name: "Verify redirect"
        action: "Check that login form is displayed"
        expected: "Login form visible, not dashboard content"
    tags: [auth, protected-route, redirect, security]
    estimated_duration: "10s"
    expected_result: "Unauthenticated users are redirected to login"

