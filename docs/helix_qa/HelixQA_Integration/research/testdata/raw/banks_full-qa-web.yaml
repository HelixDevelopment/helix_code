    tags: [auth, login, keyboard, accessibility]
    estimated_duration: "15s"
    expected_result: "Enter key submits the login form"

  - id: FQA-WEB-019
    name: "Multiple failed logins do not crash the app"
    category: functional
    priority: medium
    platforms: [web]
    steps:
      - name: "Navigate to login page"
        action: "Open http://localhost:3000/login"
        expected: "Login form displayed"
      - name: "First failed attempt"
        action: "Submit with 'admin' / 'wrong1'"
        expected: "Error message shown"
      - name: "Second failed attempt"
        action: "Submit with 'admin' / 'wrong2'"
        expected: "Error message shown again"
      - name: "Third failed attempt"
        action: "Submit with 'admin' / 'wrong3'"
        expected: "Error message shown, app still responsive"
      - name: "Successful attempt"
        action: "Submit with 'admin' / 'admin123'"
        expected: "Login succeeds and user is redirected to dashboard"
    tags: [auth, login, resilience, rate-limiting]
    estimated_duration: "30s"
    expected_result: "App handles multiple failed logins gracefully and still allows successful login"

