#
# HelixQA Test Bank: Catalogizer Full QA - Web
# Comprehensive test coverage for all web frontend pages, features, and edge
# cases. Covers login/auth, dashboard, media browser, entity browser/detail,
# collections, playlists, favorites, media player, search, settings, admin,
# AI dashboard, subtitles, conversion tools, UI/UX quality, and edge cases.

version: "1.0"
name: "Catalogizer Full QA - Web"
description: "Comprehensive QA test bank for the Catalogizer React 18/TS/Vite web frontend covering all pages, features, accessibility, security, and edge cases"
metadata:
  author: "vasic-digital"
  app: "Catalogizer"
  version: "2.3.0"

test_cases:
  # ==================== Login & Auth (FQA-WEB-001 to 020) ====================
  - id: FQA-WEB-001
    name: "Login page loads correctly"
    category: functional
    priority: critical
    platforms: [web]
    steps:
      - name: "Navigate to login page"
        action: "Open http://localhost:3000/login in the browser"
        expected: "Login page renders with username field, password field, and Sign In button"
      - name: "Verify branding"
        action: "Check for Catalogizer logo and branding elements"
        expected: "Catalogizer logo and application name are visible"
    tags: [auth, login, page-load]
    estimated_duration: "10s"
    expected_result: "Login page loads with all form elements and branding visible"

  - id: FQA-WEB-002
    name: "Login with valid admin credentials"
    category: functional
    priority: critical
    platforms: [web]
    steps:
      - name: "Navigate to login page"
        action: "Open http://localhost:3000/login"
        expected: "Login form is displayed"
      - name: "Enter admin credentials"
        action: "Type 'admin' in username field, 'admin123' in password field"
        expected: "Credentials are entered in the form fields"
      - name: "Submit login form"
        action: "Click Sign In button"
        expected: "Redirect to /dashboard with dashboard content visible"
    tags: [auth, login, happy-path, critical-flow]
    estimated_duration: "15s"
    expected_result: "Admin user successfully logs in and is redirected to dashboard"

  - id: FQA-WEB-003
    name: "Login with wrong password shows error"
    category: functional
    priority: critical
    platforms: [web]
    steps:
      - name: "Navigate to login page"
        action: "Open http://localhost:3000/login"
        expected: "Login form displayed"
      - name: "Enter wrong credentials"
        action: "Type 'admin' in username, 'wrongpassword' in password"
        expected: "Credentials entered"
      - name: "Submit login form"
        action: "Click Sign In button"
        expected: "Error message displayed indicating invalid credentials"
      - name: "Verify still on login page"
        action: "Check current URL and page content"
        expected: "Still on /login page, not redirected"
    tags: [auth, login, error-handling, negative-test]
    estimated_duration: "15s"
    expected_result: "Error message shown and user remains on login page"

  - id: FQA-WEB-004
    name: "Login with empty username shows validation"
    category: functional
    priority: high
    platforms: [web]
    steps:
      - name: "Navigate to login page"
        action: "Open http://localhost:3000/login"
        expected: "Login form displayed"
      - name: "Leave username empty"
        action: "Click into password field, type 'admin123', leave username empty"
        expected: "Password entered, username empty"
      - name: "Submit form"
        action: "Click Sign In button"
        expected: "Validation error shown for empty username field"
    tags: [auth, login, validation, form]
    estimated_duration: "10s"
    expected_result: "Form validation prevents submission with empty username"

  - id: FQA-WEB-005
    name: "Login with empty password shows validation"
    category: functional
    priority: high
    platforms: [web]
