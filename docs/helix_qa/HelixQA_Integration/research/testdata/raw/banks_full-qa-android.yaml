#
# HelixQA Test Bank: Catalogizer Full QA - Android Phone
# Comprehensive test bank covering all screens, features, and edge cases for the
# Catalogizer Android phone app (Kotlin/Compose MVVM). Touch interaction patterns,
# biometric auth, offline mode, media playback, collections, and deep links.

version: "1.0"
name: "Catalogizer Full QA - Android Phone"
description: "Comprehensive test bank for Catalogizer Android phone app covering all screens, features, and edge cases"
metadata:
  author: "vasic-digital"
  app: "Catalogizer"
  version: "2.3.0"

test_cases:
  # ==============================================================================
  # LAUNCH & AUTH (FQA-AND-001 to FQA-AND-020)
  # ==============================================================================

  - id: FQA-AND-001
    name: "Cold launch displays login screen"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Launch app from launcher"
        action: "Tap Catalogizer icon on home screen or app drawer"
        expected: "Splash screen appears briefly, then login screen is displayed"
      - name: "Verify login screen elements"
        action: "Inspect login screen layout"
        expected: "Catalogizer title, 'Sign in to your account' subtitle, username/password fields, Sign In button, Server Connection section, Vasic Digital branding footer all visible"
    tags: [launch, login, cold-start, ui]
    estimated_duration: "10s"
    expected_result: "App cold-launches to login screen with all UI elements visible"

  - id: FQA-AND-002
    name: "Server URL configuration and connect"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Locate server URL field"
        action: "Scroll to Server Connection section on login screen"
        expected: "Server URL text field visible with placeholder 'http://192.168.0.100:8080'"
      - name: "Enter server URL"
        action: "Tap server URL field and type 'http://192.168.0.100:8080'"
        expected: "URL text appears in the field"
      - name: "Tap Connect"
        action: "Tap the Connect button"
        expected: "Server saved, connection status shown as 'Connected: http://192.168.0.100:8080'"
    tags: [server, config, connect, setup]
    estimated_duration: "15s"
    expected_result: "Server URL configured and connection confirmed"

  - id: FQA-AND-003
    name: "Server discovery on local network"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Tap Discover button"
        action: "Tap the Discover button in Server Connection section"
        expected: "Loading spinner appears in server URL field trailing icon"
      - name: "Wait for discovery results"
        action: "Wait for network scan to complete (up to 30s)"
        expected: "Either discovered server URLs appear as selectable buttons below, or 'No servers found on the network' error shown"
      - name: "Select discovered server"
        action: "If servers found, tap one of the discovered server URLs"
        expected: "Server URL field populated with selected URL, connection established"
    tags: [server, discovery, network, mdns]
    estimated_duration: "35s"
    expected_result: "Server discovery completes and discovered servers are selectable"

  - id: FQA-AND-004
    name: "Login with valid credentials"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Enter username"
        action: "Tap username field and type 'admin'"
        expected: "Username text appears in field"
      - name: "Enter password"
        action: "Tap password field and type valid password"
        expected: "Password masked with dots"
      - name: "Tap Sign In"
        action: "Tap the Sign In button"
        expected: "Loading spinner appears on button, then navigates to home screen"
      - name: "Verify home screen"
        action: "Check that home screen is displayed"
        expected: "Home screen with 'Catalogizer' title in top bar, search and settings icons visible"
    tags: [login, auth, credentials, happy-path]
    estimated_duration: "15s"
    expected_result: "Successful login navigates to home screen"

  - id: FQA-AND-005
    name: "Login with invalid credentials"
    category: negative
    priority: critical
    platforms: [android]
    steps:
      - name: "Enter wrong username"
        action: "Type 'wronguser' in username field"
        expected: "Text entered"
      - name: "Enter wrong password"
        action: "Type 'wrongpassword' in password field"
        expected: "Password masked"
      - name: "Tap Sign In"
        action: "Tap Sign In button"
        expected: "Error message displayed below password field, user remains on login screen"
    tags: [login, auth, invalid, negative]
    estimated_duration: "10s"
    expected_result: "Error message shown, user stays on login screen"

  - id: FQA-AND-006
    name: "Login with empty username"
    category: negative
    priority: high
    platforms: [android]
    steps:
      - name: "Leave username empty"
        action: "Ensure username field is empty"
        expected: "Username field is blank"
      - name: "Enter password"
        action: "Type a password in password field"
        expected: "Password entered"
      - name: "Check Sign In button state"
        action: "Inspect Sign In button"
        expected: "Sign In button is disabled (username is blank)"
    tags: [login, validation, empty-field, negative]
    estimated_duration: "10s"
    expected_result: "Sign In button disabled when username is empty"

  - id: FQA-AND-007
    name: "Login with empty password"
    category: negative
    priority: high
    platforms: [android]
    steps:
      - name: "Enter username"
        action: "Type 'admin' in username field"
        expected: "Username entered"
      - name: "Leave password empty"
        action: "Ensure password field is empty"
        expected: "Password field is blank"
      - name: "Check Sign In button state"
        action: "Inspect Sign In button"
        expected: "Sign In button is disabled (password is blank)"
    tags: [login, validation, empty-field, negative]
    estimated_duration: "10s"
    expected_result: "Sign In button disabled when password is empty"

  - id: FQA-AND-008
    name: "Password visibility toggle"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Enter password"
        action: "Type 'testpassword' in password field"
        expected: "Password shown as dots (masked)"
      - name: "Tap visibility icon"
        action: "Tap the eye icon (trailing icon) on password field"
        expected: "Password text becomes visible as plain text, icon changes to eye-off"
      - name: "Tap visibility icon again"
        action: "Tap the eye-off icon"
        expected: "Password masked again with dots, icon reverts to eye"
    tags: [login, password, visibility, toggle]
    estimated_duration: "10s"
    expected_result: "Password visibility toggles correctly between masked and visible"

  - id: FQA-AND-009
    name: "Keyboard IME action next moves to password"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Tap username field"
        action: "Focus the username field"
        expected: "Keyboard appears with Next IME action"
      - name: "Press Next on keyboard"
        action: "Tap the Next/arrow button on soft keyboard"
        expected: "Focus moves to password field"
    tags: [login, keyboard, ime, navigation]
    estimated_duration: "10s"
    expected_result: "IME Next action moves focus from username to password field"

  - id: FQA-AND-010
    name: "Keyboard IME action done triggers login"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Enter credentials"
        action: "Type valid username and password"
        expected: "Both fields populated"
      - name: "Press Done on keyboard"
        action: "Tap the Done button on soft keyboard while password field is focused"
        expected: "Login attempt initiated (same as tapping Sign In button)"
    tags: [login, keyboard, ime, submit]
    estimated_duration: "15s"
    expected_result: "IME Done action on password field triggers login"

  - id: FQA-AND-011
    name: "Login without server configured"
    category: negative
    priority: high
    platforms: [android]
    steps:
      - name: "Clear server URL"
        action: "Ensure server URL field is empty and no server is connected"
        expected: "No connection status shown"
      - name: "Check field states"
        action: "Inspect username and password fields"
        expected: "Username and password fields are disabled (server not connected)"
      - name: "Check Sign In button"
        action: "Inspect Sign In button"
        expected: "Sign In button is disabled"
    tags: [login, server, no-config, negative]
    estimated_duration: "10s"
    expected_result: "Login fields and button disabled without server configuration"

  - id: FQA-AND-012
    name: "Biometric authentication availability check"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Check biometric support"
        action: "Verify device has biometric hardware (fingerprint sensor)"
        expected: "BiometricHelper.isAvailable() returns true on supported devices"
      - name: "Trigger biometric prompt"
        action: "Invoke biometric authentication flow"
        expected: "System biometric dialog appears with title 'Biometric Login' and subtitle 'Use your fingerprint to sign in'"
    tags: [biometric, fingerprint, auth, security]
    estimated_duration: "15s"
    expected_result: "Biometric prompt displayed on supported devices"

  - id: FQA-AND-013
    name: "Biometric authentication success"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Trigger biometric login"
        action: "Initiate biometric authentication from login screen"
        expected: "Biometric prompt displayed"
      - name: "Authenticate with fingerprint"
        action: "Place registered fingerprint on sensor"
        expected: "Authentication succeeds, navigates to home screen"
    tags: [biometric, fingerprint, success, happy-path]
    estimated_duration: "10s"
    expected_result: "Successful fingerprint auth navigates to home screen"

  - id: FQA-AND-014
    name: "Biometric authentication cancel falls back to password"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Trigger biometric login"
        action: "Initiate biometric authentication"
        expected: "Biometric prompt shown"
      - name: "Tap 'Use password' button"
        action: "Tap the negative button ('Use password') on biometric dialog"
        expected: "Dialog dismissed, login screen remains active with password fields"
    tags: [biometric, cancel, fallback, password]
    estimated_duration: "10s"
    expected_result: "Cancelling biometric returns to password login"

  - id: FQA-AND-015
    name: "Session persistence across app restart"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Login successfully"
        action: "Login with valid credentials"
        expected: "Home screen displayed"
      - name: "Kill and relaunch app"
        action: "Force-stop the app and relaunch from launcher"
        expected: "App opens directly to home screen (session token persisted via DataStore)"
    tags: [session, persistence, token, restart]
    estimated_duration: "20s"
    expected_result: "App remembers authentication across restarts"

  - id: FQA-AND-016
    name: "Server URL persists across app restart"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Configure server URL"
        action: "Set server URL to 'http://192.168.0.100:8080' and connect"
        expected: "Connection established"
      - name: "Kill and relaunch app"
        action: "Force-stop and relaunch"
        expected: "Server URL restored from DataStore, connection status shows saved URL"
    tags: [server, persistence, datastore, restart]
    estimated_duration: "20s"
    expected_result: "Server URL persisted via DataStore and restored on relaunch"

  - id: FQA-AND-017
    name: "Logout returns to login screen"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Navigate to settings"
        action: "Tap settings icon in home screen top bar"
        expected: "Settings screen displayed"
      - name: "Tap Sign Out"
        action: "Tap the Sign Out button in the red sign-out card"
        expected: "User logged out, navigation stack cleared, login screen displayed"
      - name: "Verify login screen"
        action: "Check that login screen is showing"
        expected: "Login screen visible with empty credential fields"
    tags: [logout, auth, navigation, session]
    estimated_duration: "15s"
    expected_result: "Logout clears session and navigates to login screen"

  - id: FQA-AND-018
    name: "Login screen scrollable when keyboard covers content"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Tap username field"
        action: "Focus the username text field"
        expected: "Soft keyboard appears"
      - name: "Scroll login form"
        action: "Scroll the login card content vertically"
        expected: "Content scrolls to reveal server configuration section and branding footer below keyboard"
    tags: [login, scroll, keyboard, layout]
    estimated_duration: "10s"
    expected_result: "Login form scrollable when keyboard is visible"

  - id: FQA-AND-019
    name: "Vasic Digital branding footer on login"
    category: visual
    priority: low
    platforms: [android]
    steps:
      - name: "Scroll to bottom of login card"
        action: "Scroll down on login screen"
        expected: "'Made with heart by Vasic Digital' text visible"
      - name: "Verify copyright"
        action: "Check copyright text below branding"
        expected: "Copyright year matches current year, 'Vasic Digital. All rights reserved.' shown"
    tags: [branding, footer, vasic-digital, visual]
    estimated_duration: "10s"
    expected_result: "Vasic Digital branding and copyright displayed on login screen"

  - id: FQA-AND-020
    name: "Invalid server URL shows warning"
    category: negative
    priority: medium
    platforms: [android]
    steps:
      - name: "Enter invalid URL"
        action: "Type 'not-a-url' in server URL field"
        expected: "Text entered"
      - name: "Tap Connect"
        action: "Tap Connect button"
        expected: "Server saved with warning: 'Server saved (could not verify - check URL if login fails)'"
    tags: [server, invalid-url, warning, negative]
    estimated_duration: "15s"
    expected_result: "Invalid server URL accepted with verification warning"

  # ==============================================================================
  # HOME SCREEN (FQA-AND-021 to FQA-AND-040)
  # ==============================================================================

  - id: FQA-AND-021
    name: "Home screen displays recently added media"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Login and reach home"
        action: "Login with valid credentials"
        expected: "Home screen displayed"
      - name: "Verify Recently Added section"
        action: "Check for 'Recently Added' section"
        expected: "Horizontal carousel of media cards under 'Recently Added' title"
    tags: [home, recently-added, carousel, content]
    estimated_duration: "15s"
    expected_result: "Recently Added media section visible with horizontal carousel"

  - id: FQA-AND-022
    name: "Home screen displays favorites section"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Verify Favorites section"
        action: "Scroll down on home screen to find 'Favorites' section"
        expected: "Horizontal carousel of favorited media cards under 'Favorites' title"
    tags: [home, favorites, carousel, content]
    estimated_duration: "10s"
    expected_result: "Favorites section visible with horizontal carousel of favorited items"

  - id: FQA-AND-023
    name: "Home screen empty state"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Login to account with no media"
        action: "Login to a fresh account with empty library"
        expected: "Home screen loads"
      - name: "Verify empty state"
        action: "Check content area"
        expected: "'No media found' title with message 'Your media library is empty. Configure storage sources to get started.'"
    tags: [home, empty-state, first-run]
    estimated_duration: "15s"
    expected_result: "Empty state displayed with helpful guidance message"

  - id: FQA-AND-024
    name: "Home screen loading indicator"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Navigate to home"
        action: "Trigger home data load"
        expected: "CircularProgressIndicator centered on screen while data loads"
      - name: "Wait for load"
        action: "Wait for data to arrive"
        expected: "Loading indicator disappears, content sections appear"
    tags: [home, loading, progress, indicator]
    estimated_duration: "10s"
    expected_result: "Loading spinner shown during data fetch, replaced by content"

  - id: FQA-AND-025
    name: "Home screen error state"
    category: negative
    priority: high
    platforms: [android]
    steps:
      - name: "Simulate server error"
        action: "Disconnect from server or make API fail"
        expected: "Home screen loads with error card"
      - name: "Verify error card"
        action: "Check error display"
        expected: "Red/error-colored card with error message text visible"
    tags: [home, error, server-down, negative]
    estimated_duration: "15s"
    expected_result: "Error message displayed in error-colored card on home screen"

  - id: FQA-AND-026
    name: "Home screen search icon navigates to search"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Tap search icon"
        action: "Tap the search icon in the top app bar"
        expected: "Search screen opens with text input field and back button"
    tags: [home, navigation, search, toolbar]
    estimated_duration: "10s"
    expected_result: "Search icon navigates to search screen"

  - id: FQA-AND-027
    name: "Home screen settings icon navigates to settings"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Tap settings icon"
        action: "Tap the settings icon in the top app bar"
        expected: "Settings screen opens with 'Settings' title and back button"
    tags: [home, navigation, settings, toolbar]
    estimated_duration: "10s"
    expected_result: "Settings icon navigates to settings screen"

  - id: FQA-AND-028
    name: "Media card displays title and year"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "View a media card in carousel"
        action: "Look at a media card in Recently Added or Favorites"
        expected: "Card shows media type initial letter in placeholder, title text (max 2 lines with ellipsis), year if available"
    tags: [home, media-card, title, year, ui]
    estimated_duration: "10s"
    expected_result: "Media card displays type initial, title, and year"

  - id: FQA-AND-029
    name: "Media card displays rating"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Find a rated media card"
        action: "Scroll through carousels to find a card with rating"
        expected: "Rating displayed as formatted decimal (e.g., '8.5') in primary color"
    tags: [home, media-card, rating, ui]
    estimated_duration: "10s"
    expected_result: "Media card rating displayed in primary color"

  - id: FQA-AND-030
    name: "Horizontal carousel scrolls with swipe"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Swipe carousel left"
        action: "Swipe left on the Recently Added carousel"
        expected: "Carousel scrolls to reveal more media cards to the right"
      - name: "Swipe carousel right"
        action: "Swipe right on the carousel"
        expected: "Carousel scrolls back to the beginning"
    tags: [home, carousel, scroll, swipe, gesture]
    estimated_duration: "10s"
    expected_result: "Horizontal carousels scroll smoothly with swipe gestures"

  - id: FQA-AND-031
    name: "Tap media card navigates to detail"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Tap a media card"
        action: "Tap on any media card in a carousel"
        expected: "Navigation to media detail screen triggered (onNavigateToMediaDetail callback)"
    tags: [home, media-card, tap, navigation, detail]
    estimated_duration: "10s"
    expected_result: "Tapping a media card navigates to its detail screen"

  - id: FQA-AND-032
    name: "Home screen vertical scroll between sections"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Scroll down"
        action: "Scroll down on home screen past Recently Added section"
        expected: "Favorites section scrolls into view"
      - name: "Scroll up"
        action: "Scroll back to the top"
        expected: "Recently Added section visible again with top bar"
    tags: [home, scroll, vertical, sections]
    estimated_duration: "10s"
    expected_result: "Vertical scrolling between media sections works smoothly"

  - id: FQA-AND-033
    name: "Home screen media type initial in card placeholder"
    category: visual
    priority: medium
    platforms: [android]
    steps:
      - name: "Observe card placeholders"
        action: "Look at media cards without cover art"
        expected: "Each card shows the first character of the media type uppercased (e.g., 'M' for movie, 'T' for tv_show) in surfaceVariant background"
    tags: [home, placeholder, media-type, visual]
    estimated_duration: "10s"
    expected_result: "Media type initial displayed as placeholder in card image area"

  - id: FQA-AND-034
    name: "Home screen carousel card spacing"
    category: visual
    priority: low
    platforms: [android]
    steps:
      - name: "Inspect carousel layout"
        action: "Observe horizontal spacing between media cards"
        expected: "Cards have 12dp horizontal spacing, 16dp padding from screen edges"
    tags: [home, layout, spacing, visual]
    estimated_duration: "10s"
    expected_result: "Carousel cards properly spaced with padding"

  - id: FQA-AND-035
    name: "Home screen section title typography"
    category: visual
    priority: low
    platforms: [android]
    steps:
      - name: "Check section titles"
        action: "Verify 'Recently Added' and 'Favorites' text style"
        expected: "Titles use titleLarge typography with 16dp horizontal padding and 8dp vertical padding"
    tags: [home, typography, section-title, visual]
    estimated_duration: "10s"
    expected_result: "Section titles use correct typography"

  - id: FQA-AND-036
    name: "Home screen card width and image height"
    category: visual
    priority: low
    platforms: [android]
    steps:
      - name: "Inspect media card dimensions"
        action: "Check card layout measurements"
        expected: "Card width is 140dp, image area height is 180dp"
    tags: [home, card, dimensions, visual]
    estimated_duration: "10s"
    expected_result: "Media cards have correct width (140dp) and image height (180dp)"

  - id: FQA-AND-037
    name: "Home screen top app bar title"
    category: visual
    priority: medium
    platforms: [android]
    steps:
      - name: "Verify top bar"
        action: "Check the top app bar content"
        expected: "Title shows 'Catalogizer', search and settings action icons present"
    tags: [home, appbar, title, visual]
    estimated_duration: "10s"
    expected_result: "Top app bar shows Catalogizer title with action icons"

  - id: FQA-AND-038
    name: "Home screen data refreshes on re-navigation"
    category: functional
    priority: medium
    platforms: [android]
    steps:
      - name: "Navigate away from home"
        action: "Go to search screen"
        expected: "Search screen displayed"
      - name: "Navigate back to home"
        action: "Tap back button"
        expected: "Home screen displayed with data reload triggered (LaunchedEffect on Unit)"
    tags: [home, refresh, navigation, data]
    estimated_duration: "15s"
    expected_result: "Home data reloads when screen is re-composed"

  - id: FQA-AND-039
    name: "Home screen handles large number of media cards"
    category: stress
    priority: medium
    platforms: [android]
    steps:
      - name: "Load library with many items"
        action: "Ensure server has 100+ media items"
        expected: "Recently Added carousel loads without lag"
      - name: "Scroll through all items"
        action: "Swipe carousel to the end"
        expected: "All items accessible via horizontal scroll, no jank or dropped frames"
    tags: [home, stress, performance, many-items]
    estimated_duration: "30s"
    expected_result: "Large carousels render and scroll smoothly"

  - id: FQA-AND-040
    name: "Home screen Material 3 theme colors"
    category: visual
    priority: low
    platforms: [android]
    steps:
      - name: "Verify color scheme"
        action: "Observe home screen color usage"
        expected: "Material 3 color scheme applied: primary color for ratings, surfaceVariant for card placeholders, errorContainer for error cards"
    tags: [home, theme, material3, colors, visual]
    estimated_duration: "10s"
    expected_result: "Material 3 color scheme correctly applied throughout home screen"

  # ==============================================================================
  # MEDIA BROWSING (FQA-AND-041 to FQA-AND-080)
  # ==============================================================================

  - id: FQA-AND-041
    name: "Search screen initial state"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Navigate to search"
        action: "Tap search icon from home screen"
        expected: "Search screen with text field in top bar, back arrow, and prompt 'Enter a search term to find media'"
    tags: [search, initial-state, prompt]
    estimated_duration: "10s"
    expected_result: "Search screen shows empty state with helpful prompt"

  - id: FQA-AND-042
    name: "Search for movie by title - The Matrix"
    category: functional
    priority: critical
    platforms: [android]
    steps:
      - name: "Type search query"
        action: "Type 'Matrix' in the search field"
        expected: "Debounced search triggers after typing"
      - name: "Verify results"
        action: "Check search results list"
        expected: "Results containing 'Matrix' displayed in scrollable list with title, media type, year, and quality"
    tags: [search, movie, matrix, query, happy-path]
    estimated_duration: "15s"
    expected_result: "Matrix search returns relevant movie results"

  - id: FQA-AND-043
    name: "Search for music artist - Metallica"
    category: functional
    priority: high
    platforms: [android]
    steps:
      - name: "Type search query"
        action: "Type 'Metallica' in the search field"
        expected: "Search triggers"
      - name: "Verify results"
        action: "Check for music results"
        expected: "Metallica-related media items shown with music media type"
    tags: [search, music, metallica, query]
    estimated_duration: "15s"
    expected_result: "Metallica search returns music-related results"

  - id: FQA-AND-044
    name: "Search with Cyrillic characters"
    category: functional
