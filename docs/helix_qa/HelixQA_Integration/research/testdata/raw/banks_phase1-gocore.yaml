    tags: [phase1, gocore, sidecarutil, unit]
    estimated_duration: "5s"
    expected_result: "Framing + health-probe + FD passing all pass tests"
    fix_reference:
      bug_id: "OPENCLAWING4-PHASE1-M2"
      description: "Stdio framing + SCM_RIGHTS + --health — the sidecar contract"
      fix_file: "pkg/bridge/sidecarutil/framing.go"
      fix_commit: "pending"

  - id: P1G-SIDECARUTIL-002
    name: "pkg/bridge/sidecarutil: SCM_RIGHTS FD roundtrip over socketpair"
    category: integration
    priority: critical
    platforms: [all]
    steps:
      - name: "TestPassFD_RecvFD_Roundtrip passes on Linux"
        action: "go test -run 'TestPassFD_RecvFD_Roundtrip' -count=1 -race ./pkg/bridge/sidecarutil/..."
        expected: "PASS (test opens a socketpair, sends a pipe's write-end via PassFD, receives it via RecvFD, writes through the received FD, reads on the pipe's read-end)"
    tags: [phase1, gocore, sidecarutil, integration]
    estimated_duration: "2s"
    expected_result: "FD passing actually transfers a usable FD"
    fix_reference:
      bug_id: "OPENCLAWING4-PHASE1-M2-FD"
      description: "FD passing must survive the kernel round-trip and deliver a live descriptor"
      fix_file: "pkg/bridge/sidecarutil/framing.go"
      fix_commit: "pending"

  - id: P1G-SIDECARUTIL-003
    name: "pkg/bridge/sidecarutil: HealthProbe enforces exact 'ok\\n' + exit 0"
    category: unit
    priority: high
    platforms: [all]
    steps:
      - name: "TestHealthProbe_OK passes"
        action: "go test -run 'TestHealthProbe_OK' -count=1 ./pkg/bridge/sidecarutil/..."
        expected: "PASS"
      - name: "Wrong stdout is rejected"
        action: "go test -run 'TestHealthProbe_WrongStdout' -count=1 ./pkg/bridge/sidecarutil/..."
        expected: "PASS — HealthProbe returns error on any stdout != 'ok\\n'"
      - name: "Non-zero exit is rejected"
        action: "go test -run 'TestHealthProbe_NonZeroExit' -count=1 ./pkg/bridge/sidecarutil/..."
        expected: "PASS"
    tags: [phase1, gocore, sidecarutil, health]
    estimated_duration: "3s"
    expected_result: "Health probe contract is strictly enforced — no fuzzy stdout tolerance"
    fix_reference:
      bug_id: "OPENCLAWING4-PHASE1-M2-HEALTH"
      description: "Sidecar health contract: exit 0 + stdout 'ok\\n' exactly"
      fix_file: "pkg/bridge/sidecarutil/framing.go"
      fix_commit: "pending"

