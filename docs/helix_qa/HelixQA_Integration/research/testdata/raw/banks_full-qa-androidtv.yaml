#
# HelixQA Test Bank: Catalogizer Full QA - Android TV
# Comprehensive QA coverage for the Catalogizer Android TV app running on
# Xiaomi Mi Box 4 (192.168.0.214:5555, Android 9). Covers app launch, login,
# home screen, media browsing, detail, playback, TV home screen channels,
# deep linking, Watch Next, favorites, collections, settings, search,
# and edge cases/negative scenarios. All navigation is via DPAD remote.

version: "1.0"
name: "Catalogizer Full QA - Android TV"
description: "Comprehensive end-to-end QA test bank for the Catalogizer Android TV app (v2.3.0) on Xiaomi Mi Box 4. Covers all screens, DPAD navigation, media playback, TV home screen channels, deep linking, Watch Next, favorites, settings, search, and edge cases."
metadata:
  author: "vasic-digital"
  app: "Catalogizer"
  version: "2.3.0"

test_cases:
  # ==================== App Launch (FQA-ATV-001 to 010) ====================

  - id: FQA-ATV-001
    name: "App launches from Android TV home screen"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Navigate to Catalogizer on TV home"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "App icon is visible and focusable on the home screen"
      - name: "Press DPAD_CENTER to launch"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "App begins launching, splash or loading screen appears"
    tags: [launch, home-screen, critical-path]
    estimated_duration: "10s"
    expected_result: "Catalogizer app launches successfully from the Android TV home screen"

  - id: FQA-ATV-002
    name: "App displays splash or loading screen on launch"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Launch app"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Splash screen or loading indicator is displayed"
      - name: "Verify branding"
        action: "screenshot"
        expected: "CATALOGIZER branding text and Media Collection Manager subtitle visible"
    tags: [launch, splash, branding]
    estimated_duration: "10s"
    expected_result: "Splash/loading screen displays with correct Catalogizer branding"

  - id: FQA-ATV-003
    name: "First launch shows server configuration"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Fresh install launch"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Login screen displays with SERVER CONNECTION section visible"
      - name: "Verify server URL field"
        action: "screenshot"
        expected: "Server URL OutlinedTextField is visible with Discover and Connect buttons"
    tags: [launch, first-launch, server-config]
    estimated_duration: "15s"
    expected_result: "First launch presents server URL configuration on the login screen"

  - id: FQA-ATV-004
    name: "Configure server URL via DPAD"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Navigate to server URL field"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Server URL field receives focus with animated border highlight"
      - name: "Open keyboard"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "On-screen keyboard appears"
      - name: "Type server URL"
        action: "text: http://localhost:8080"
        expected: "Server URL field displays http://localhost:8080"
    tags: [launch, server-config, dpad, text-input]
    estimated_duration: "30s"
    expected_result: "Server URL is successfully entered via DPAD navigation"

  - id: FQA-ATV-005
    name: "Connect button tests server connectivity"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Enter server URL"
        action: "text: http://localhost:8080"
        expected: "Server URL field populated"
      - name: "Press Connect"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Connection test initiates, trailing icon shows loading spinner"
      - name: "Verify connection status"
        action: "screenshot"
        expected: "Green checkmark icon appears on successful connection, Connected to server text below"
    tags: [launch, server-config, connectivity]
    estimated_duration: "15s"
    expected_result: "Connect button tests and confirms server connectivity"

  - id: FQA-ATV-006
    name: "Discover button finds servers on network"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Press Discover"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Discovery starts, Searching for server... status appears"
      - name: "Wait for discovery"
        action: "sleep: 10000"
        expected: "Either discovered servers appear as selectable buttons or No servers found message"
    tags: [launch, server-config, discovery, network]
    estimated_duration: "20s"
    expected_result: "Discover button initiates network discovery for Catalogizer API instances"

  - id: FQA-ATV-007
    name: "Auto-discovery selects single server"
    category: functional
    priority: medium
    platforms: [androidtv]
    steps:
      - name: "Launch with auto-discovery enabled and no saved URL"
        action: "adb_shell: pm clear com.catalogizer.androidtv && am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Auto-discovery runs on launch"
      - name: "Verify auto-selection"
        action: "screenshot"
        expected: "Server URL field auto-populated and Connected to {name} status shown"
    tags: [launch, auto-discovery, server-config]
    estimated_duration: "15s"
    expected_result: "Single discovered server is automatically selected and connected"

  - id: FQA-ATV-008
    name: "Server URL persists across app restarts"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Configure server URL"
        action: "text: http://localhost:8080"
        expected: "Server URL saved via DataStore"
      - name: "Kill and restart app"
        action: "adb_shell: am force-stop com.catalogizer.androidtv && sleep 1 && am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "App launches with previously saved server URL pre-filled"
    tags: [launch, persistence, datastore]
    estimated_duration: "20s"
    expected_result: "Server URL configuration persists across app restarts"

  - id: FQA-ATV-009
    name: "Login screen displays correctly on launch"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Launch app"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Login screen is the initial screen for unauthenticated users"
      - name: "Verify login form elements"
        action: "screenshot"
        expected: "Username field, Password field, Sign In button, SERVER CONNECTION section all visible"
      - name: "Verify branding"
        action: "screenshot"
        expected: "CATALOGIZER title and Media Collection Manager subtitle displayed"
    tags: [launch, login, ui-verification]
    estimated_duration: "10s"
    expected_result: "Login screen displays correctly with all form elements and branding"

  - id: FQA-ATV-010
    name: "Username field auto-focused on launch"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Launch app to login screen"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Login screen displayed"
      - name: "Verify initial focus"
        action: "screenshot"
        expected: "Username field has focus with animated border highlight (ice-blue glow)"
    tags: [launch, focus, dpad, accessibility]
    estimated_duration: "10s"
    expected_result: "Username field receives auto-focus on login screen load"

  # ==================== Login Flow (FQA-ATV-011 to 025) ====================

  - id: FQA-ATV-011
    name: "Login with valid credentials"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Enter username"
        action: "text: admin"
        expected: "Username field shows admin"
      - name: "Navigate to password"
        action: "keypress: KEYCODE_TAB"
        expected: "Password field receives focus"
      - name: "Enter password"
        action: "text: admin123"
        expected: "Password field shows masked characters"
      - name: "Submit login"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Loading spinner appears on Sign In button"
      - name: "Verify navigation"
        action: "sleep: 3000"
        expected: "Navigates to home screen, login screen removed from back stack"
    tags: [login, authentication, critical-path, happy-path]
    estimated_duration: "20s"
    expected_result: "Valid credentials authenticate successfully and navigate to home screen"

  - id: FQA-ATV-012
    name: "DPAD navigate to username field"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Start from login screen"
        action: "screenshot"
        expected: "Login form visible"
      - name: "Focus username"
        action: "keypress: KEYCODE_DPAD_UP"
        expected: "Username field shows animated ice-blue border glow, background becomes slightly brighter"
    tags: [login, dpad, focus, navigation]
    estimated_duration: "10s"
    expected_result: "Username field is focusable and shows visible focus indicator via DPAD"

  - id: FQA-ATV-013
    name: "DPAD_CENTER opens keyboard on username field"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Focus username field"
        action: "keypress: KEYCODE_DPAD_UP"
        expected: "Username field focused"
      - name: "Open keyboard"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "On-screen keyboard or IME appears, field is ready for text input"
    tags: [login, dpad, keyboard, text-input]
    estimated_duration: "10s"
    expected_result: "DPAD_CENTER activates the keyboard for text entry in username field"

  - id: FQA-ATV-014
    name: "Type username via keyboard"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Activate username field"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Keyboard active"
      - name: "Type username"
        action: "text: admin"
        expected: "Username field displays admin in white text"
    tags: [login, text-input, keyboard]
    estimated_duration: "15s"
    expected_result: "Username text is entered successfully into the field"

  - id: FQA-ATV-015
    name: "KEYCODE_TAB moves to password field"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Enter username"
        action: "text: admin"
        expected: "Username populated"
      - name: "Tab to password"
        action: "keypress: KEYCODE_TAB"
        expected: "Password field receives focus with animated border glow"
    tags: [login, dpad, tab, field-navigation]
    estimated_duration: "10s"
    expected_result: "KEYCODE_TAB successfully moves focus from username to password field"

  - id: FQA-ATV-016
    name: "Type password with masking"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Focus password field"
        action: "keypress: KEYCODE_TAB"
        expected: "Password field focused"
      - name: "Enter password"
        action: "text: admin123"
        expected: "Password field displays masked dots, not plaintext"
      - name: "Verify masking"
        action: "screenshot"
        expected: "PasswordVisualTransformation applied, password icon visible as trailing icon"
    tags: [login, password, masking, security]
    estimated_duration: "15s"
    expected_result: "Password is entered and masked with dots for security"

  - id: FQA-ATV-017
    name: "DPAD to Sign In button and press center"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Fill credentials"
        action: "text: admin"
        expected: "Both fields populated"
      - name: "Navigate to Sign In"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Sign In button receives focus"
      - name: "Press Sign In"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Login initiated, loading spinner replaces Sign In text"
    tags: [login, dpad, submit, button]
    estimated_duration: "15s"
    expected_result: "DPAD navigation to Sign In button works and DPAD_CENTER triggers login"

  - id: FQA-ATV-018
    name: "Login success navigates to home screen"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Perform valid login"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Authentication succeeds"
      - name: "Verify home screen"
        action: "screenshot"
        expected: "Home screen displayed with Catalogizer top bar, search icon, settings icon"
      - name: "Verify login screen removed"
        action: "keypress: KEYCODE_BACK"
        expected: "Does not return to login screen (popUpTo with inclusive=true)"
    tags: [login, navigation, home-screen, critical-path]
    estimated_duration: "15s"
    expected_result: "Successful login navigates to home screen with login screen removed from back stack"

  - id: FQA-ATV-019
    name: "Login with wrong password shows error"
    category: negative
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Enter valid username"
        action: "text: admin"
        expected: "Username populated"
      - name: "Enter wrong password"
        action: "text: wrongpassword"
        expected: "Password populated"
      - name: "Submit login"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Error message appears in red error box below the login button"
      - name: "Verify still on login screen"
        action: "screenshot"
        expected: "Login screen still displayed, not navigated to home"
    tags: [login, negative, error-handling, authentication]
    estimated_duration: "15s"
    expected_result: "Wrong password displays error message and remains on login screen"

  - id: FQA-ATV-020
    name: "Login with empty username shows validation error"
    category: negative
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Leave username empty"
        action: "screenshot"
        expected: "Username field blank"
      - name: "Enter password"
        action: "text: admin123"
        expected: "Password populated"
      - name: "Submit login"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Username is required validation error displayed below username field in red"
    tags: [login, validation, empty-field, negative]
    estimated_duration: "10s"
    expected_result: "Empty username triggers client-side validation error"

  - id: FQA-ATV-021
    name: "Login with empty password shows validation error"
    category: negative
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Enter username"
        action: "text: admin"
        expected: "Username populated"
      - name: "Leave password empty"
        action: "screenshot"
        expected: "Password field blank"
      - name: "Submit login"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Password is required validation error displayed below password field in red"
    tags: [login, validation, empty-field, negative]
    estimated_duration: "10s"
    expected_result: "Empty password triggers client-side validation error"

  - id: FQA-ATV-022
    name: "Login with short username shows validation error"
    category: negative
    priority: medium
    platforms: [androidtv]
    steps:
      - name: "Enter single character username"
        action: "text: a"
        expected: "Username contains single character"
      - name: "Enter valid password"
        action: "text: admin123"
        expected: "Password populated"
      - name: "Submit login"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Username must be at least 2 characters validation error displayed"
    tags: [login, validation, min-length, negative]
    estimated_duration: "10s"
    expected_result: "Username under 2 characters triggers validation error"

  - id: FQA-ATV-023
    name: "Login with short password shows validation error"
    category: negative
    priority: medium
    platforms: [androidtv]
    steps:
      - name: "Enter valid username"
        action: "text: admin"
        expected: "Username populated"
      - name: "Enter short password"
        action: "text: abc"
        expected: "Password has 3 characters"
      - name: "Submit login"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Password must be at least 4 characters validation error displayed"
    tags: [login, validation, min-length, negative]
    estimated_duration: "10s"
    expected_result: "Password under 4 characters triggers validation error"

  - id: FQA-ATV-024
    name: "Saved username restored on login screen"
    category: functional
    priority: medium
    platforms: [androidtv]
    steps:
      - name: "Login successfully"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Navigated to home screen, username saved to DataStore"
      - name: "Logout and return to login"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Login screen displayed"
      - name: "Verify saved username"
        action: "screenshot"
        expected: "Username field pre-populated with admin from previous session"
    tags: [login, persistence, remember-me, datastore]
    estimated_duration: "25s"
    expected_result: "Previously used username is restored on the login screen"

  - id: FQA-ATV-025
    name: "Server URL change flow"
    category: functional
    priority: medium
    platforms: [androidtv]
    steps:
      - name: "Navigate to server URL field"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Server URL field focused"
      - name: "Clear existing URL"
        action: "adb_shell: input keyevent KEYCODE_MOVE_END && input keyevent --longpress KEYCODE_DEL"
        expected: "Server URL field empty"
      - name: "Enter new URL"
        action: "text: http://192.168.0.100:8080"
        expected: "New URL displayed in field"
      - name: "Test connection"
        action: "keypress: KEYCODE_DPAD_CENTER"
        expected: "Connection test runs, result indicator updates"
    tags: [login, server-config, url-change]
    estimated_duration: "20s"
    expected_result: "Server URL can be changed and tested from the login screen"

  # ==================== Home Screen (FQA-ATV-026 to 050) ====================

  - id: FQA-ATV-026
    name: "Home screen loads after login"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Login successfully"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Home screen displayed"
      - name: "Verify top bar"
        action: "screenshot"
        expected: "Catalogizer title, search icon, and settings icon visible in TopBar"
    tags: [home, critical-path, post-login]
    estimated_duration: "15s"
    expected_result: "Home screen loads with TopBar displaying Catalogizer branding and action icons"

  - id: FQA-ATV-027
    name: "Category rows display on home screen"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Navigate to home screen"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Home screen content loading"
      - name: "Verify category rows"
        action: "screenshot"
        expected: "At least one content rail visible (e.g., Recently Added Movies, Recently Added TV Shows)"
    tags: [home, categories, content-rails]
    estimated_duration: "15s"
    expected_result: "Home screen displays category rows with media content"

  - id: FQA-ATV-028
    name: "Continue Watching rail displays"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "With partially watched content"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Home screen loads"
      - name: "Verify Continue Watching"
        action: "screenshot"
        expected: "Continue Watching rail appears at the top with items that have watch progress"
    tags: [home, continue-watching, progress]
    estimated_duration: "15s"
    expected_result: "Continue Watching rail shows partially watched media items"

  - id: FQA-ATV-029
    name: "Recently Added Movies rail"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Home screen loaded"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Home screen displayed"
      - name: "Verify movies rail"
        action: "screenshot"
        expected: "Recently Added Movies rail visible with movie cards in LazyRow"
    tags: [home, movies, content-rails]
    estimated_duration: "10s"
    expected_result: "Recently Added Movies rail displays with movie content cards"

  - id: FQA-ATV-030
    name: "Recently Added TV Shows rail"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Home screen loaded"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Home screen displayed"
      - name: "Verify TV shows rail"
        action: "screenshot"
        expected: "Recently Added TV Shows rail visible with show cards"
    tags: [home, tv-shows, content-rails]
    estimated_duration: "10s"
    expected_result: "Recently Added TV Shows rail displays with TV show content cards"

  - id: FQA-ATV-031
    name: "Recently Added Music Albums rail"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Home screen loaded"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Home screen displayed"
      - name: "Verify music rail"
        action: "screenshot"
        expected: "Recently Added Music Albums rail visible with album cards"
    tags: [home, music, content-rails]
    estimated_duration: "10s"
    expected_result: "Recently Added Music Albums rail displays with album content cards"

  - id: FQA-ATV-032
    name: "DPAD left/right scrolls within category row"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Focus a media card in a row"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Media card receives focus"
      - name: "Scroll right"
        action: "keypress: KEYCODE_DPAD_RIGHT"
        expected: "Focus moves to next cards in the LazyRow, row scrolls horizontally to reveal more items"
      - name: "Scroll left"
        action: "keypress: KEYCODE_DPAD_LEFT"
        expected: "Focus moves back to previous cards"
    tags: [home, dpad, horizontal-scroll, navigation]
    estimated_duration: "15s"
    expected_result: "DPAD left/right navigates and scrolls within category rows"

  - id: FQA-ATV-033
    name: "DPAD up/down navigates between rows"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Focus item in first row"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "First row item focused"
      - name: "Navigate down"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Focus moves to an item in the next content rail below"
      - name: "Navigate up"
        action: "keypress: KEYCODE_DPAD_UP"
        expected: "Focus returns to the previous content rail above"
    tags: [home, dpad, vertical-navigation, rows]
    estimated_duration: "10s"
    expected_result: "DPAD up/down moves focus between content rails vertically"

  - id: FQA-ATV-034
    name: "Focus ring visible on selected media card"
    category: functional
    priority: critical
    platforms: [androidtv]
    steps:
      - name: "Navigate to a media card"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Media card is focused"
      - name: "Verify focus indicator"
        action: "screenshot"
        expected: "Card shows visible focus ring/border or scale animation indicating it is selected"
    tags: [home, focus, accessibility, dpad]
    estimated_duration: "10s"
    expected_result: "Focused media card has a clearly visible focus indicator"

  - id: FQA-ATV-035
    name: "Poster images load on media cards"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "Home screen with content"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Content rails visible"
      - name: "Verify image loading"
        action: "screenshot"
        expected: "Poster/cover images load via Coil AsyncImage, not showing placeholder indefinitely"
    tags: [home, images, coil, async-loading]
    estimated_duration: "15s"
    expected_result: "Media card poster images load correctly from the server"

  - id: FQA-ATV-036
    name: "Title text readable on media cards"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "View media cards"
        action: "keypress: KEYCODE_DPAD_DOWN"
        expected: "Media cards displayed"
      - name: "Verify title visibility"
        action: "screenshot"
        expected: "Media title text is readable, properly sized for 10-foot TV viewing"
    tags: [home, text, readability, accessibility]
    estimated_duration: "10s"
    expected_result: "Media card titles are readable at TV viewing distance"

  - id: FQA-ATV-037
    name: "Category section headers visible"
    category: functional
    priority: high
    platforms: [androidtv]
    steps:
      - name: "View home screen"
        action: "adb_shell: am start -n com.catalogizer.androidtv/.ui.MainActivity"
        expected: "Multiple rails visible"
      - name: "Verify section headers"
        action: "screenshot"
        expected: "Section headers like Recently Added Movies, Recently Added TV Shows clearly visible"
    tags: [home, headers, typography, sections]
    estimated_duration: "10s"
    expected_result: "Category section headers are visible above each content rail"

  - id: FQA-ATV-038
    name: "Catalog stats header displays"
    category: functional
    priority: medium
    platforms: [androidtv]
