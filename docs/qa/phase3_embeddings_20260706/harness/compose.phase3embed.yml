# Phase-3 CPU embeddings service — HF Text Embeddings Inference (TEI), CPU-only.
# Booted THROUGH the containers submodule compose.Orchestrator (§11.4.76),
# rootless podman (§11.4.161). NO GPU device (contrast the P0 GPU proof) — the
# structural guarantee this ships before the P0/P1 GPU chain.
#
# No hardcoded model / host port (§CONST-045 / §CONST-046): every value is
# injected from the environment by run_proof.sh; the compose file carries no
# literal. `${VAR}` are always set by the harness before boot.
services:
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command:
      - "--model-id"
      - "${TEI_MODEL_ID}"
      - "--port"
      - "80"
      - "--hostname"
      - "0.0.0.0"
    ports:
      - "${TEI_HOST_PORT}:80"
    volumes:
      # Persistent HF-model cache (design §3.1) — an EXTERNAL named volume shared
      # across lane projects so model weights are fetched from HF once and then
      # reused. This is a §11.4.77 re-obtainable artefact (the weights re-download
      # if the volume is dropped); persisting it makes boots reliable + fast and
      # avoids re-exposing transient HF-download flakiness on every run. The
      # container/pod is still torn down each run (single-owner cleanup §11.4.119);
      # only this cache survives.
      - helixllm-tei-cache:/data
    # §12.3 container hygiene — bounded so the embedder never starves the
    # developer host (§12.6). Config-injected, captured as evidence.
    mem_limit: "${TEI_MEM_LIMIT}"
    cpus: ${TEI_CPUS}
    restart: "no"
volumes:
  helixllm-tei-cache:
    external: true
    name: helixllm-tei-cache
