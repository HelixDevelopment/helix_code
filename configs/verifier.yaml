    enabled: true
    endpoint: https://api.anthropic.com/v1
    timeout: 30s
    models:
      - claude-3-5-sonnet
      - claude-3-5-haiku
      - claude-3-opus

  # --------------------------------------------------------------------------
  # Google Gemini
  # --------------------------------------------------------------------------
  gemini:
    enabled: true
    endpoint: https://generativelanguage.googleapis.com/v1beta
    timeout: 30s
    models:
      - gemini-2.5-pro
      - gemini-2.5-flash
      - gemini-1.5-pro

  # --------------------------------------------------------------------------
  # DeepSeek
  # --------------------------------------------------------------------------
  deepseek:
    enabled: true
    endpoint: https://api.deepseek.com/v1
    timeout: 30s
