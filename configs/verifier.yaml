# ============================================================================
# LLMsVerifier Integration Configuration
# Version: 2.0.0
# Authority: CONST-036 — LLMsVerifier Single Source of Truth Mandate
# ============================================================================

verifier:
  # Master enable/disable for the entire verifier subsystem
  enabled: false

  # Operation mode: "remote" (REST API) or "embedded" (future)
  mode: remote

  # LLMsVerifier REST API endpoint
  # In production, this points to the deployed verifier service.
  # In development, this typically points to localhost:8081.
  endpoint: http://localhost:8081

  # Optional API key for authenticated verifier access.
  # If empty, the client will still attempt unauthenticated requests.
  api_key: ""

  # Request timeout for individual verifier API calls.
  # Must be between 5s and 5m.
  timeout: 30s

  # ==========================================================================
  # Cache Configuration
  # ==========================================================================
  cache:
    # How long to cache verifier responses in memory.
    # Must be between 1s and 24h.
    ttl: 5m

    # Maximum number of entries in the cache.
    max_entries: 1000

  # ==========================================================================
  # Background Polling Configuration
  # ==========================================================================
  polling:
    # How often to poll the verifier for model/pricing updates.
    # Must be between 10s and 1h.
    interval: 60s

    # Whether to enable the background polling goroutine at startup.
    enabled: true

  # ==========================================================================
  # Scoring Weights
  # ==========================================================================
  # These weights control how verifier scores are combined with local
  # heuristics in ModelManager.SelectOptimalModel().
  #
  # When verifier is available, the final score is a weighted blend:
  #   - 60% from the verifier (normalized 0-10 scale)
  #   - 40% from local heuristics (capability, context, task, hardware)
  #
  # Within the verifier's contribution, these weights determine how the
  # composite score is built from the 5 verification dimensions.
  # All weights must sum to exactly 1.0.
  # ==========================================================================
  scoring:
    # Model's performance on code generation, editing, and refactoring tasks.
    code_capability: 0.40

    # Latency / time-to-first-token performance.
    responsiveness: 0.20

    # Uptime and consistency of results.
    reliability: 0.20

    # Breadth of features (multimodal, tool calling, function calling, etc.).
    feature_richness: 0.15

    # Price-to-performance ratio.
    value_proposition: 0.05

  # ==========================================================================
  # Health Monitoring & Circuit Breaker
  # ==========================================================================
  health:
    # How many consecutive failures before opening the circuit.
    failure_threshold: 5

    # How many consecutive successes in Half-Open state before closing.
    recovery_threshold: 3

    # How long to wait in Open state before trying Half-Open.
    half_open_timeout: 60s

  # ==========================================================================
  # Event System Configuration
  # ==========================================================================
  events:
    # Whether to enable the event publisher for model/pricing changes.
    enabled: true

    # WebSocket endpoint for real-time events (optional; if empty,
    # the publisher will broadcast only in-process).
    websocket_url: ""

    # Maximum number of events to queue before dropping.
    buffer_size: 100

# ============================================================================
# Provider Configuration
# ============================================================================
# Each provider block controls whether it is enabled and what settings
# are used when talking to its API.
#
# API keys are NOT stored here. They are read from environment variables
# and bound by internal/config/config.go during Load().
# ============================================================================

providers:
  # --------------------------------------------------------------------------
  # OpenAI
  # --------------------------------------------------------------------------
  openai:
    enabled: true
    endpoint: https://api.openai.com/v1
    timeout: 30s
    models:
      - gpt-4o
      - gpt-4o-mini
      - gpt-4-turbo
      - gpt-4.1
      - o1
      - o3-mini

  # --------------------------------------------------------------------------
  # Anthropic
  # --------------------------------------------------------------------------
