    endpoint: https://api.groq.com/openai/v1
    timeout: 30s
    models:
      - llama-3.3-70b-versatile
      - mixtral-8x7b-32768
      - gemma2-9b-it

  # --------------------------------------------------------------------------
  # Mistral AI
  # --------------------------------------------------------------------------
  mistral:
    enabled: true
    endpoint: https://api.mistral.ai/v1
    timeout: 30s
