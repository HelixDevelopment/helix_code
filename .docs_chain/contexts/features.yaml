context: features
description: >-
  HelixCode feature-Status doc chain (§11.4.106 docs_chain, §11.4.45/§11.4.65/§11.4.153).
  docs/features/Status.md is a HAND-AUTHORED markdown SOURCE (the §11.4.153 per-feature
  ledger — its 560+-row reconciled inventory, per-feature video-confirmation columns,
  deepened sections and regression-guard table are hand-curated, NOT mechanically
  derivable). docs/features/Status_Summary.md is its hand-authored two-audience digest
  (§11.4.56). ONLY the .html/.pdf exports are derived (the same md->html->pdf builtin
  pattern proven by .docs_chain/contexts/governance.yaml + issues.yaml). The
  docs/features/inventory/*.md slices are supplementary research artefacts in their own
  right; they are NOT aggregated into Status.md.
  #
  # FIX (§11.4.102 systematic-debugging + §11.4.120 reconciliation, 2026-06-16):
  # the PRIOR model declared Status.md a DERIVED `kind: status` target with an
  # `aggregate-inventory` generator (scripts/generate_features_status.sh). That
  # generator emits a LOSSY rev1 aggregation (859 lines = _status_header.md + raw
  # inventory concat) that does NOT contain the hand-authored rev7 content
  # (1003 lines), so a `docs_chain sync` CLOBBERED the hand-authored Status.md
  # (observed 2026-06-16: rev7 -> rev1, 168 deletions; restored from git e414a496).
  # ROOT CAUSE = derived-vs-source mis-modelling (a hand-authored ledger wired as a
  # lossy-generated target). Resolution (b) from the prior header is adopted:
  # Status.md/Status_Summary.md are hand-authored `kind: markdown` SOURCES and the
  # aggregate-inventory + gen-features-summary edges are DROPPED. This matches the
  # PROVEN governance.yaml/issues.yaml pattern (CLAUDE.md/Issues.md = markdown source,
  # export edges only) so `docs_chain sync` regenerates ONLY the .html/.pdf exports
  # from the hand-authored .md and can never again overwrite the ledger.
  # The generators (scripts/generate_features_{status,summary}.sh) remain on disk,
  # UNWIRED — a future operator may repurpose them, but they are no longer Status.md
  # transforms. (.docx exports are produced out-of-band via pandoc per §11.4.153 —
  # docs_chain has no docx builtin, so they are intentionally not modelled here.)
nodes:
  # --- hand-authored markdown SOURCES (NOT derived) ---
  status_md:      { kind: markdown, path: docs/features/Status.md }
  status_summary: { kind: markdown, path: docs/features/Status_Summary.md }
  # --- derived exports (the ONLY derive edges) ---
  status_html:    { kind: html,     path: docs/features/Status.html }
  status_pdf:     { kind: pdf,      path: docs/features/Status.pdf }
  summary_html:   { kind: html,     path: docs/features/Status_Summary.html }
  summary_pdf:    { kind: pdf,      path: docs/features/Status_Summary.pdf }
edges:
  # VERIFIED builtins (same pandoc/weasyprint pair as governance.yaml + issues.yaml):
  - { type: derive-from, from: status_md,      to: status_html,  transform: md-to-html }
  - { type: derive-from, from: status_html,    to: status_pdf,   transform: html-to-pdf }
  - { type: derive-from, from: status_summary, to: summary_html, transform: md-to-html }
  - { type: derive-from, from: summary_html,   to: summary_pdf,  transform: html-to-pdf }
transforms:
  md-to-html:           { builtin: pandoc-html }
  html-to-pdf:          { builtin: weasyprint-pdf }
