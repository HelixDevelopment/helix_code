context: semgrep_status
description: >-
  Semgrep static-analysis status ledger sync chain (§11.4.166 universal-semgrep
  mandate; §11.4.106 docs_chain; §11.4.65 universal-markdown-export). The
  consumer-side docs/semgrep/Status.md is the hand-authored SOURCE recording
  semgrep install / validate / real-scan events for /Volumes/T7/Projects/helix_code;
  only the .html/.pdf siblings are derived. The constitution submodule keeps its
  own authoritative ledger at constitution/docs/semgrep/Status.md (inherited by
  reference per §11.4.28/§11.4.35 — not duplicated here). Run
  `docs_chain verify --root . semgrep_status` as a pre-build gate;
  `docs_chain sync --root . semgrep_status` to regenerate exports.
nodes:
  # --- hand-authored markdown SOURCE ---
  semgrep_status_md:   { kind: markdown, path: docs/semgrep/Status.md }
  # --- derived exports (the ONLY derive edges) ---
  semgrep_status_html: { kind: html,     path: docs/semgrep/Status.html }
  semgrep_status_pdf:  { kind: pdf,      path: docs/semgrep/Status.pdf }
edges:
  - { type: derive-from, from: semgrep_status_md,   to: semgrep_status_html, transform: md-to-html }
  - { type: derive-from, from: semgrep_status_html, to: semgrep_status_pdf,  transform: html-to-pdf }
transforms:
  md-to-html:  { builtin: pandoc-html }
  html-to-pdf: { builtin: weasyprint-pdf }
