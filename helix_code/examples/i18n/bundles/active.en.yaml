# examples/ i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/examples/ to a message ID resolved at runtime via
# Translator.T. A consuming binary wires a real *i18nadapter.Translator;
# the in-package NoopTranslator echoes the message ID verbatim — which
# is the honest default for a developer running `go run main.go`.
#
# Naming convention: examples_<demo>_<short_description>. All IDs
# prefixed with examples_ to avoid namespace collision with other
# packages' bundles when loaded into the same go-i18n.Bundle.
#
# Round-347 §11.4 anti-bluff sweep (2026-05-20): migrated the
# developer-facing console-narration literals across the genuine
# (non-mock) example programs — phase3/basic, phase3/feature_dev,
# phase3/code_review, phase3/debugging, phase3/templates,
# phase3/multi_session, and qa_integration. The mock-LLM fixture
# payloads inside phase3/multi_agent_system/main.go are deliberately
# NOT migrated: they are test fixtures inside a demo that simulates
# LLM work via a MockLLMProvider — localizing simulated-work fixtures
# would itself be a §11.4 / CONST-035 violation. See round-347 report.

