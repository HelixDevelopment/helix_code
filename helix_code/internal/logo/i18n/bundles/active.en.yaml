# internal/logo i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/internal/logo/ to a message ID resolved at runtime
# via Translator.T. helix_code wires a real *i18nadapter.Translator
# at boot; the in-package NoopTranslator echoes the message ID
# verbatim for unit tests + backward compat.
#
# Naming convention: internal_logo_<area>_<short_description>.
# All IDs prefixed with internal_logo_ to avoid namespace
# collision with other packages' bundles when loaded into the same
# go-i18n.Bundle.
#
# Round-163 §11.4 anti-bluff sweep (2026-05-19): migrated 7 distinct
# user-facing error/warning strings emitted by processor.go covering
# the LogoProcessor lifecycle (file open/decode failures across
# ExtractColors + GenerateASCIIArt, plus the JSON/CSS/Go theme
# write failures that bubble up through SaveColorScheme +
# GenerateThemeFiles + GenerateIcons).
#
# Color hex values, file-output basenames (icon-NxN.png,
# color-scheme.json, helix-theme.css, theme.go), CSS class names,
# Go const identifiers, and ASCII-art glyphs are NOT migrated in
# this round — they are stable identity / asset tokens consumed by
# downstream platform-asset generation, not user-facing display
# content. Migrating them would silently rewrite asset names used
# by build/deploy pipelines.

internal_logo_open_source_failed:
  other: "failed to open logo file: {{.Error}}"

internal_logo_decode_source_failed:
  other: "failed to decode logo image: {{.Error}}"

internal_logo_create_icon_file_failed:
  other: "failed to create icon file {{.Path}}: {{.Error}}"

internal_logo_encode_icon_png_failed:
  other: "failed to encode icon PNG {{.Path}}: {{.Error}}"

internal_logo_create_color_scheme_failed:
  other: "failed to create color-scheme file {{.Path}}: {{.Error}}"

internal_logo_write_color_scheme_failed:
  other: "failed to write color-scheme JSON to {{.Path}}: {{.Error}}"

internal_logo_write_theme_file_failed:
  other: "failed to write theme file {{.Path}}: {{.Error}}"
