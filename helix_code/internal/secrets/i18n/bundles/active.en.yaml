# internal/secrets i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/internal/secrets/loader.go to a message ID resolved at
# runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: internal_secrets_<area>_<short_description>.
# All IDs prefixed with internal_secrets_ to avoid namespace
# collision with other packages' bundles when loaded into the same
# go-i18n.Bundle.
#
# Round-225 §11.4 anti-bluff sweep (2026-05-19): migrated the sole
# user-facing literal emitted by loader.go — the error message
# returned when neither $HOME/api_keys.sh nor a walked-up .env file
# is present. This is the only operator-visible string in the
# package; the rest of the surface is silent file I/O and os.Setenv
# (CONST-042 §12.1 — values are NEVER logged or surfaced).

internal_secrets_no_source_found:
  other: "no api_keys.sh or .env found"
