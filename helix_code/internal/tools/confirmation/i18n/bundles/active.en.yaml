# internal/tools/confirmation i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/internal/tools/confirmation/ to a message ID resolved
# at runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: internal_tools_confirmation_<area>_<short>.
# All IDs prefixed with internal_tools_confirmation_ to avoid
# namespace collision with other packages' bundles when loaded into
# the same go-i18n.Bundle.
#
# Round-382 §11.4 anti-bluff sweep (2026-05-19): migrated 26
# user-facing literals covering:
#   - danger.go (16: dangerous-operation descriptions surfaced to
#     the operator in the confirmation prompt's Warnings section)
#   - prompter.go (10: prompt title, irreversibility warning, and
#     the 4 default option label/description pairs shown in the
#     interactive confirmation prompt).
# Pattern Name fields (delete_operation, rm_rf_command, etc.) are
# stable internal identifiers — NOT user-facing — and are NOT
# migrated. The Risk-level enum strings (.String()) are diagnostic
# tokens and out of this round's scope.

