internal_server_project_manager_unavailable:
  other: "Project manager not available"

internal_server_task_not_found:
  other: "Task not found"

internal_server_task_manager_unavailable:
  other: "Task manager not available"

internal_server_worker_not_found:
  other: "Worker not found"

internal_server_worker_manager_unavailable:
  other: "Worker manager not available"

internal_server_session_not_found:
  other: "Session not found"

internal_server_session_manager_unavailable:
