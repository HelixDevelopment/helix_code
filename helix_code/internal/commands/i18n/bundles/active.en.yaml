# internal/commands i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/internal/commands/ to a message ID resolved at runtime
# via Translator.T. helix_code wires a real *i18nadapter.Translator
# at boot; the in-package NoopTranslator echoes the message ID
# verbatim for unit tests + backward compat.
#
# Naming convention: internal_commands_<area>_<short_description>.
# All IDs prefixed with internal_commands_ to avoid namespace
# collision with other packages' bundles when loaded into the same
# go-i18n.Bundle.
#
# Round-149 §11.4 anti-bluff sweep (2026-05-18): migrated 10 of the
# most user-facing literals emitted by executor.go (4 required-field
# messages), mcp_command.go + tasks_command.go (2 manager-not-init
# messages), hooks_command.go + permissions_command.go (4 usage
# hints). Remaining hardcoded prompts, log strings, and table headers
# in 50+ other commands files are deferred to future rounds to stay
# under the size cap.

