# Round-358 §11.4 CONST-046 Phase-4 sweep (2026-05-20): /reportbug
# bug-report-document template strings. formatBugReport() composes
# the GitHub-issue body the operator authors and submits — its
# section headings and placeholder instructions ("[Please describe
# ...]") are read and acted upon by the reporting user, so they are
# genuine (C) user-facing UI text. Developer-facing log-collection
# diagnostics in collectRecentLogs() stay class (B) — out of scope.
builtin_reportbug_title_prefix:
  other: "Bug: {{.Description}}"
builtin_reportbug_section_description:
  other: "## Description"
builtin_reportbug_section_system_info:
  other: "## System Information"
builtin_reportbug_section_reproduction:
  other: "## Reproduction Steps"
builtin_reportbug_section_logs:
  other: "## Recent Logs"
builtin_reportbug_section_expected:
  other: "## Expected Behavior"
builtin_reportbug_placeholder_expected:
  other: "[Please describe what you expected to happen]"
builtin_reportbug_section_actual:
  other: "## Actual Behavior"
builtin_reportbug_placeholder_actual:
  other: "[Please describe what actually happened]"
builtin_reportbug_placeholder_repro_steps:
  other: "1. [Please describe the steps to reproduce]"
builtin_reportbug_footer:
  other: "*Generated by HelixCode /reportbug command*"
builtin_reportbug_no_log_files:
  other: "Note: No log files found. Log entries may be in memory or stdout."
builtin_reportbug_logger_configured:
  other: "Logger configured: {{.Logger}}"
builtin_reportbug_enable_file_logging:
  other: "To enable file logging, configure log output in helixcode config."
