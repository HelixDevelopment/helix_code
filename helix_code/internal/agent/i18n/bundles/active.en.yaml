# internal/agent i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/internal/agent/coordinator.go, base_agent.go,
# resilience.go and workflow.go to a message ID resolved at runtime
# via Translator.T. helix_code wires a real *i18nadapter.Translator
# at boot; the in-package NoopTranslator echoes the message ID
# verbatim for unit tests + backward compat.
#
# Naming convention: internal_agent_<area>_<short_description>. All
# IDs prefixed with internal_agent_ to avoid namespace collision with
# other packages' bundles when loaded into the same go-i18n.Bundle.
#
# Round-147 §11.4 anti-bluff sweep (2026-05-18): migrated 10 of the
# user-facing literals emitted by coordinator.go + base_agent.go —
# the nil-task / not-found / no-agent / shutdown-failure / workflow-
# executor / unsupported-task-type / LLM-required messages.
# Sentinel ErrX vars in agent.go (fmt.Errorf wrapping) remain
# untouched to preserve public API. Remaining hardcoded prompts and
# logging strings are deferred to a future round to stay under the
# size cap.
#
# Round-197 §11.4 anti-bluff sweep (2026-05-19): migrated next-10
# user-facing literals across base_agent.go (LLM-required messages
# for review/refactoring/documentation, missing-input validators,
# tool-registry) + resilience.go (circuit-breaker open) +
# workflow.go (workflow-stuck / workflow-not-found / no-agent-for-
# capability). Skip log lines + dev-facing fmt.Errorf wrapping (per
# round-197 mandate). Skip ErrX sentinel errors.New (round 146
# precedent — public API surface stability). Prompt templates in
# buildPromptForTask deferred (large multi-line YAML payloads better
# served by a dedicated future round).

internal_agent_task_cannot_be_nil:
  other: "task cannot be nil"

internal_agent_task_not_found:
