# internal/notification i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/internal/notification/ to a message ID resolved at runtime
# via Translator.T. helix_code wires a real *i18nadapter.Translator at
# boot; the in-package NoopTranslator echoes the message ID verbatim
# for unit tests + backward compat.
#
# Naming convention: internal_notification_<area>_<short_description>.
# All IDs prefixed with internal_notification_ to avoid namespace
# collision with other packages' bundles when loaded into the same
# go-i18n.Bundle.
#
# Round-167 §11.4 anti-bluff sweep (2026-05-19): migrated the top-10
# user-facing strings emitted by event_handler.go — the 9 Title fields
# that surface in operator notifications (Task Completed/Failed,
# Workflow Completed/Failed, Worker Disconnected/Health-Degraded,
# System Error/Started/Shutdown) plus the canonical "HelixCode system
# started" message body. These are the strings that reach end users
# via Slack/Discord/Email/Telegram/Webhook payloads and operator
# dashboards.
#
# Round-385 §11.4 anti-bluff sweep (2026-05-20): completed the
# event_handler.go migration — the 10 Message bodies + 5 default
# fallback values that round-167 left as fmt.Sprintf English literals.

internal_notification_title_task_completed:
  other: "Task Completed"

internal_notification_title_task_failed:
  other: "Task Failed"

internal_notification_title_workflow_completed:
  other: "Workflow Completed"

internal_notification_title_workflow_failed:
  other: "Workflow Failed"

internal_notification_title_worker_disconnected:
  other: "Worker Disconnected"

internal_notification_title_worker_health_degraded:
  other: "Worker Health Degraded"

internal_notification_title_system_error:
  other: "System Error"

internal_notification_title_system_started:
  other: "System Started"

internal_notification_title_system_shutdown:
  other: "System Shutdown"

internal_notification_message_system_started:
  other: "HelixCode system started"

# Round-385 §11.4 anti-bluff sweep (2026-05-20): migrated the
# remaining genuine user-facing Message bodies emitted by
# event_handler.go. These strings reach end users via
# Slack/Discord/Email/Telegram/Webhook payloads and operator
# dashboards — round-167 covered the Title fields but left the
# Message bodies as fmt.Sprintf English literals. Placeholders use
# go-i18n {{.Name}} template syntax resolved at runtime.

internal_notification_message_task_completed:
  other: "Task {{.TaskID}} completed successfully"

internal_notification_message_duration_suffix:
  other: " in {{.Duration}}"

internal_notification_message_task_failed:
  other: "Task {{.TaskID}} failed: {{.Error}}"

internal_notification_message_workflow_completed:
  other: "Workflow '{{.WorkflowName}}' completed successfully"

internal_notification_message_workflow_failed:
  other: "Workflow '{{.WorkflowName}}' failed: {{.Error}}"

internal_notification_message_worker_disconnected:
  other: "Worker {{.WorkerID}} ({{.Host}}) disconnected: {{.Reason}}"

internal_notification_message_worker_health_degraded:
  other: "Worker {{.WorkerID}} ({{.Host}}) health status: {{.HealthStatus}}"

internal_notification_message_system_error:
  other: "Error in {{.Component}}: {{.Error}}"

internal_notification_message_version_suffix:
  other: " (version {{.Version}})"

internal_notification_message_system_shutdown:
  other: "HelixCode system shutting down: {{.Reason}}"

# Default fallback values used when event Data omits a field.
internal_notification_value_unknown_error:
  other: "Unknown error"

internal_notification_value_unknown_reason:
  other: "Unknown reason"

internal_notification_value_unknown_host:
  other: "unknown"

internal_notification_value_health_degraded:
  other: "degraded"

internal_notification_value_normal_shutdown:
  other: "Normal shutdown"
