# terminal_ui i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/applications/terminal_ui/main.go to a message ID resolved
# at runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: terminal_ui_<area>_<short_description>. All IDs
# prefixed with terminal_ui_ to avoid namespace collision with other
# submodules' bundles when loaded into the same go-i18n.Bundle.
#
# Round-137 §11.4 anti-bluff sweep (2026-05-18): 10 highest-impact
# sidebar + status-bar labels migrated (one shot at the most-trafficked
# UI surface). Remaining hardcoded strings tracked for future rounds.

