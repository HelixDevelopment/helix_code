# harmony_os i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/applications/harmony_os/main_nogui.go to a message ID
# resolved at runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: harmony_os_<area>_<short_description>. All IDs
# prefixed with harmony_os_ to avoid namespace collision with other
# submodules' bundles when loaded into the same go-i18n.Bundle.
#
# Round-96 §11.4 anti-bluff sweep (2026-05-18): 5 highest-impact
# CLI section headers migrated.
#
# Round-330 §11.4 anti-bluff sweep (2026-05-20): 20 additional
# nogui CLI strings migrated — the full help body, status info
# lines, command/subcommand error messages, empty-list notices,
# and CRUD confirmation messages that anchor every text-mode
# interaction with the Harmony OS CLI client (main_nogui.go).
# Placeholder-bearing entries use go-i18n {{.Name}} interpolation.
#
# Round-438 §11.4 anti-bluff sweep (2026-05-20): 24 GUI strings
# migrated from main_nogui.go's GUI sibling main.go — the main
# window title, status bar, all ten AppTab labels, and the
# dashboard / system-monitoring / distributed-services card
# titles + subtitles that anchor every Fyne-mode interaction.

