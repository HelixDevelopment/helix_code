# desktop i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/applications/desktop/main.go to a message ID resolved
# at runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: desktop_<area>_<short_description>. All IDs
# prefixed with desktop_ to avoid namespace collision with other
# submodules' bundles when loaded into the same go-i18n.Bundle.
#
# Round-136 §11.4 anti-bluff sweep (2026-05-18): 10 highest-impact
# UI labels migrated. Remaining hardcoded strings tracked for
# future rounds.

