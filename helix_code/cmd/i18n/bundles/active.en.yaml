# helix_code/cmd i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in the
# helix_code/cmd cobra command tree (local_llm.go,
# local_llm_advanced.go) to a message ID resolved at runtime via
# Translator.T. helix_code wires a real *i18nadapter.Translator at
# boot; the in-package NoopTranslator echoes the message ID verbatim
# for unit tests + backward compat.
#
# Naming convention: cmd_<area>_<short_description>. All IDs prefixed
# with cmd_ to avoid namespace collision with other submodules'
# bundles when loaded into the same go-i18n.Bundle.
