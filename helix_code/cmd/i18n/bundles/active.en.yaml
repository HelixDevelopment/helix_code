# Round-422 §11.4 anti-bluff sweep (2026-05-20, CONST-046 Phase 4):
# local-llm cobra command Short/Long descriptions + flag-help text
# migrated to trc()-resolved message IDs (command-construction time).

cmd_local_llm_short:
  other: "Manage local LLM providers"

cmd_local_llm_long:
  other: |-
    Manage local LLM providers including VLLM, LocalAI, FastChat, TextGen,
    LM Studio, Jan AI, KoboldAI, GPT4All, TabbyAPI, MLX, and MistralRS.

    This command automatically clones, builds, configures, and manages all local
    LLM providers with zero configuration required.

cmd_local_llm_flag_dir:
  other: "Base directory for local LLM providers (default: ~/.helixcode/local-llm)"

cmd_local_llm_flag_autostart:
  other: "Auto-start all providers after initialization"

cmd_local_llm_flag_health_interval:
  other: "Health check interval in seconds"

cmd_local_llm_init_short:
  other: "Initialize and install all local LLM providers"

cmd_local_llm_init_long:
  other: |-
    Initialize and install all local LLM providers. This command will:
    - Clone provider repositories
    - Build and configure providers
    - Create startup scripts
    - Set up default configurations

    This may take 10-30 minutes depending on your system and internet speed.

cmd_local_llm_start_short:
  other: "Start local LLM providers"

cmd_local_llm_start_long:
  other: |-
    Start local LLM providers. If no provider is specified, all providers will be started.
    You can start individual providers by specifying their name.

    Available providers: vllm, localai, fastchat, textgen, lmstudio, jan, koboldai, gpt4all, tabbyapi, mlx, mistralrs

cmd_local_llm_stop_short:
  other: "Stop local LLM providers"

cmd_local_llm_stop_long:
  other: |-
    Stop local LLM providers. If no provider is specified, all providers will be stopped.
    You can stop individual providers by specifying their name.

cmd_local_llm_status_short:
  other: "Show status of all local LLM providers"

cmd_local_llm_status_long:
  other: |-
    Show detailed status of all local LLM providers including:
    - Installation status
    - Running status
    - Health check results
    - Process information
    - Last check timestamp

cmd_local_llm_list_short:
  other: "List all available local LLM providers"

cmd_local_llm_list_long:
  other: |-
    List all available local LLM providers with their descriptions,
    default ports, and current status.

cmd_local_llm_cleanup_short:
  other: "Stop all providers and clean up resources"

cmd_local_llm_cleanup_long:
  other: |-
    Stop all running local LLM providers and clean up temporary resources.
    Downloaded models and configurations will be preserved.

cmd_local_llm_discover_short:
  other: "Discover and explore available models"

cmd_local_llm_discover_long:
  other: |-
    Discover models from various sources with advanced filtering
    and search capabilities. This command provides a comprehensive
    catalog of models with detailed information about capabilities,
    performance, and compatibility.

    Sources include:
    - Local downloaded models
    - HuggingFace model hub
    - Community repositories
    - Private repositories

    Examples:
      helix local-llm discover
      helix local-llm discover --filter "code generation"
      helix local-llm discover --source huggingface --filter "7b"

cmd_local_llm_recommend_short:
  other: "Get intelligent model recommendations"

cmd_local_llm_recommend_long:
  other: |-
    Get personalized model recommendations based on your
    specific requirements, hardware, usage patterns, and preferences.

    The recommendation engine considers:
    - Task requirements and complexity
    - Hardware capabilities and constraints
    - Performance preferences (speed vs quality)
    - Budget limitations
    - Privacy requirements
    - Historical usage patterns

    Examples:
      helix local-llm recommend --tasks code_generation,debugging
      helix local-llm recommend --quality fast --max-memory 8192
      helix local-llm recommend --budget 0.1 --privacy local

cmd_local_llm_analytics_short:
  other: "View usage analytics and statistics"

cmd_local_llm_analytics_long:
  other: |-
    View comprehensive usage analytics including model performance,
    user behavior, task patterns, and system utilization.

    Analytics include:
    - Model usage statistics and trends
    - Performance metrics and bottlenecks
    - User behavior and preferences
    - Task patterns and efficiency
    - Optimization impact
    - Cost analysis

    Examples:
      helix local-llm analytics
      helix local-llm analytics --time-range 30d

cmd_local_llm_report_short:
  other: "Generate comprehensive usage reports"

cmd_local_llm_report_long:
  other: |-
    Generate detailed usage reports in various formats.
    Reports can be exported as tables, JSON, or CSV for further analysis.

    Report types:
    - Executive summary
    - Performance analysis
    - User behavior analysis
    - Cost analysis
    - Optimization impact
    - Recommendations

    Examples:
      helix local-llm report
      helix local-llm report --format json --time-range 30d

cmd_local_llm_insights_short:
  other: "Get AI-powered insights and recommendations"

cmd_local_llm_insights_long:
  other: |-
    Get AI-powered insights about your LLM usage, performance,
    optimization opportunities, and strategic recommendations.

    Insights include:
    - Performance bottlenecks and solutions
    - Cost optimization opportunities
    - Usage pattern analysis
    - Predictive recommendations
    - Trend analysis
    - Competitive insights

    Examples:
      helix local-llm insights
      helix local-llm insights --type performance
      helix local-llm insights --type usage

cmd_local_llm_update_short:
  other: "Update local LLM providers"

cmd_local_llm_update_long:
  other: |-
    Update local LLM providers to their latest versions.
    If no provider is specified, all providers will be updated.

cmd_local_llm_logs_short:
  other: "Show logs for local LLM providers"

cmd_local_llm_logs_long:
  other: |-
    Show logs for local LLM providers. If no provider is specified,
    logs for all running providers will be displayed.

cmd_local_llm_provider_desc_vllm:
