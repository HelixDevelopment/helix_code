# security_test i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/cmd/security_test/main.go to a message ID resolved at
# runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: security_test_<area>_<short_description>. All IDs
# prefixed with security_test_ to avoid namespace collision with other
# submodules' bundles when loaded into the same go-i18n.Bundle.
#
# Round-142 §11.4 anti-bluff sweep (2026-05-18): migrated 10 of 17
# detected user-facing hardcoded literals — covering all 12 security
# test-suite names (cohesive cluster) plus the FAIL/WARN summary
# strings. The 5 residual literals (info banners + 3 fmt.Printf table
# headings) are deferred to a future round to stay under the round
# size cap.
#
# Round-460 §11.4 anti-bluff sweep (2026-05-20): migrated the 4
# residual security-test-suite names (Container / Configuration /
# File System / Logging) that round-142 deferred, plus the
# "=== SECURITY TEST RESULTS ===" banner, the four results-table
# rows, and the terminal "All security tests completed" line.

security_test_suite_llm_provider:
  other: "LLM Provider Security"

security_test_suite_ssh_connection:
  other: "SSH Connection Security"

security_test_suite_database:
  other: "Database Security"

security_test_suite_authentication:
  other: "Authentication Security"

security_test_suite_input_validation:
  other: "Input Validation Security"

security_test_suite_api:
  other: "API Security"

