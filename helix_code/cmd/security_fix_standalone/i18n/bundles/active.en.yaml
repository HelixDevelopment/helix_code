# security_fix_standalone i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/cmd/security_fix_standalone/main.go to a message ID
# resolved at runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: security_fix_standalone_<area>_<short_description>.
# All IDs prefixed with security_fix_standalone_ to avoid namespace
# collision with the sibling security_fix bundle (round 143) or any
# other CLI's bundles when loaded into the same go-i18n.Bundle.
#
# Round-145 §11.4 anti-bluff sweep (2026-05-18): migrated 10 of the
# user-facing literals emitted by main.go — the start/policy banners,
# the path / critical-only echo lines, the validation header,
# the final headline rows, and the success / failure terminal lines.
# Remaining log.Printf format strings (fix-issue progress rows,
# per-handler manual-intervention messages, report-template static
# content) are deferred to a future round to stay under the round
# size cap.
#
# Round-460 §11.4 anti-bluff sweep (2026-05-20): migrated the
# report-helper verdict strings — the zero-tolerance / production-
# readiness / security-posture / compliance-status evaluation blocks,
# the empty-issues placeholder, and the static fix-recommendation
# lines. These multi-line verdicts are end-user-visible report body
# content written to zero_tolerance_security_fix_report.txt.

