# lsp_cmd.go
cli_lsp_root_short:
  other: "Inspect, list, restart, or stop managed LSP servers"
cli_lsp_root_long:
  other: |-
    Operator surface for the LSPManager. Subcommands:
      status         show running servers (default when no subcommand supplied)
      list-servers   show curated allowlist with on-path + running annotations
      restart <name> tear down the named server (next file-open respawns it)
      stop <name>    stop the named server without auto-respawn
