# cli i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/cmd/cli/main.go to a message ID resolved at runtime via
# Translator.T. helix_code wires a real *i18nadapter.Translator at
# boot; the in-package NoopTranslator echoes the message ID verbatim
# for unit tests + backward compat.
#
# Naming convention: cli_<area>_<short_description>. All IDs prefixed
# with cli_ to avoid namespace collision with other submodules'
# bundles when loaded into the same go-i18n.Bundle.
#
# Round-131 §11.4 anti-bluff sweep (2026-05-18): first 10 highest-impact
# user-facing strings from the REPL, worker-stats, and QA handlers
# migrated.
#
# Round-196 §11.4 anti-bluff sweep (2026-05-19): NEXT 10 high-impact
# strings — section headers ("=== Worker Statistics ==="), system-health
# success line, REPL greeting + goodbye, fallback-model notice, and
# CPU/memory/GPU stat lines. These are the next-most-likely strings a
# non-English end user sees on every CLI invocation; they were ranked
# #11-#20 by emission frequency in the round-131 baseline.
#
# After round-196, 20 of 37 strings (54%) have been migrated.
#
# Round-202 §11.4 anti-bluff sweep (2026-05-19): NEXT 10 high-impact
# strings — the showHelp() section headers + five slash-command help
# lines, worker-add success message, and the LLM-generation header +
# prompt-echo lines. The Command-Line-Options block stays literal in
# round-202 because every line is anchored to a verbatim flag name
# (--list-workers, --worker, --user, --key, --prompt, --model,
# --stream, --notify, --notify-type, --notify-priority) which MUST stay
# machine-stable across locales — they are shell tokens, not human
# content. A future round MAY migrate the trailing description half.
#
# After round-202, 30 of 37 strings (81%) have been migrated.

