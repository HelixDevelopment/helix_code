# --- Round-320 §11.4 CONST-046 Phase 4 (2026-05-20): subcommand help
# text (Short/Long) + per-subcommand flag descriptions for the show /
# get / set / delete / validate / export / import / backup commands.
# 52 user-facing literals — these appear on every `helix-config
# <subcommand> --help` invocation.

helix_config_cmd_show_short:
  other: "Show current configuration"

helix_config_cmd_show_long:
  other: |-
    Display the current HelixCode configuration.

    The configuration can be filtered by section or displayed in its entirety.
    Sensitive values are masked by default unless --show-secrets is used.

helix_config_flag_section_show:
  other: "Show only specific section"

helix_config_flag_masked:
  other: "Show masked sensitive values"

helix_config_flag_defaults_show:
  other: "Show default values for unset fields"

helix_config_flag_flattened:
  other: "Show configuration in flattened key-value format"

helix_config_cmd_get_short:
  other: "Get a configuration value"

helix_config_cmd_get_long:
  other: |-
    Retrieve a specific configuration value by key path.

    Examples:
      helix-config get application.name
      helix-config get server.port
      helix-config get llm.default_provider

helix_config_flag_type_show:
  other: "Show the type of the value"

helix_config_flag_source_show:
  other: "Show the source of the value"

helix_config_flag_valid:
  other: "Validate the retrieved value"

helix_config_cmd_set_short:
  other: "Set a configuration value"

helix_config_cmd_set_long:
  other: |-
    Set a specific configuration value by key path.

    The value is interpreted based on the target field type.
    Use quotes for string values containing spaces.

    Examples:
      helix-config set application.name "My App"
      helix-config set server.port 8080
      helix-config set llm.temperature 0.8

helix_config_flag_create:
  other: "Create field if it doesn't exist"

helix_config_flag_validate_set:
  other: "Validate value before setting"

helix_config_flag_type_force:
  other: "Force value type (string, int, float, bool)"

helix_config_flag_format_parse:
  other: "Value format for parsing"

helix_config_flag_backup_set:
  other: "Create backup before setting"

helix_config_flag_restart:
  other: "Restart affected services after setting"

helix_config_cmd_delete_short:
  other: "Delete a configuration value"

helix_config_cmd_delete_long:
  other: |-
    Delete a specific configuration value by key path.

