# infrastructure CLI i18n bundle — active English (en) locale.
#
# Every entry maps a CONST-046-migrated hardcoded literal in
# helix_code/cmd/infrastructure/main.go to a message ID resolved at
# runtime via Translator.T. helix_code wires a real
# *i18nadapter.Translator at boot; the in-package NoopTranslator
# echoes the message ID verbatim for unit tests + backward compat.
#
# Naming convention: infra_<area>_<short_description>. All IDs
# prefixed with infra_ to avoid namespace collision with other
# submodules' bundles when loaded into the same go-i18n.Bundle.
#
# Round-455 §11.4 anti-bluff sweep (2026-05-20): established this
# package-main subdirectory's i18n seam (the cmd/infrastructure CLI
# previously had no seam at all) and migrated the user-facing
# lifecycle messages: start/stop/status banners + verdicts, the
# usage/help text block, and the unknown-mode / unknown-command
# error lines. Identifier tokens, wrapped-error tech strings, and
# go-format-spec-only fragments are intentionally excluded per the
# CONST-046 scoping rules.

