# SonarQube Project Configuration for HelixCode (root-level)
# Values are expanded from environment variables at scan time via sonar-scanner -D flags.
# Set these in HelixCode/.env (gitignored, mode 0600) before running:
#   SONARQUBE_PROJECT_KEY, SONARQUBE_PROJECT_NAME, SONARQUBE_PROJECT_VERSION

sonar.projectKey=${SONARQUBE_PROJECT_KEY}
sonar.projectName=${SONARQUBE_PROJECT_NAME}
sonar.projectVersion=${SONARQUBE_PROJECT_VERSION}

sonar.sources=.
sonar.exclusions=vendor/**,**/testdata/**,**/*_test.go,**/mock_*.go,reports/**,bin/**,docs/**,**/node_modules/**,applications/**

sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**,**/bin/**

sonar.go.coverage.reportPaths=coverage.out
sonar.go.tests.reportPaths=test-report.json

sonar.sourceEncoding=UTF-8

sonar.qualitygate.wait=false

sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S1151
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
