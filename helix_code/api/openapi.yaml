          example: sess_1234567890
        project_id:
          type: string
          example: proj_my-project_1234567890
        name:
          type: string
          example: Feature Development Session
        description:
          type: string
          example: Working on new feature implementation
        mode:
          type: string
          enum: [planning, building, testing, refactoring, debugging, deployment]
          example: building
        status:
          type: string
          enum: [active, paused, completed, failed]
          example: active
        focus_chain_id:
          type: string
        context:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties:
            type: string
        tags:
          type: array
          items:
            type: string
        duration:
          type: string
          example: "2h30m"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time

    CreateSessionRequest:
      type: object
